                const starPos = new Float32Array(starCount * 3);
                starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
                const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 2, transparent: true, opacity: 0.3 });
                this.stars = new THREE.Points(starGeo, starMat);
                this.stars.renderOrder = -1;
                this.scene.add(this.stars);
                this.starBase = [];
                for (let i = 0; i < starCount; i++) {
                    this.starBase.push({ x: (i * 137.5) % 10000, y: (i * 73.3) % 10000 });
                }

                console.log('[three] Three.js 初始化完成（统一图集）');
            },

            buildWorld() {
                const ts = CONFIG.TILE_SIZE;
                const W = CONFIG.WORLD_WIDTH;
                const H = CONFIG.WORLD_HEIGHT;
                let count = 0;
                let waterCount = 0;
                const texIndexAttr = this.terrainMesh.geometry.attributes.aTileIndex;

                // 全部隐藏
                for (let i = 0; i < this.terrainMesh.count; i++) {
                    this.terrainMesh.setMatrixAt(i, this._matrixHide);
                }
                this.terrainMesh.instanceMatrix.needsUpdate = true;

                for (let x = 0; x < W; x++) {
                    for (let y = 0; y < H; y++) {
                        const block = State.world[x][y];
                        if (block === 'air' || !block) {
                            this.instanceMap[x][y] = null;
                            continue;
                        }

                        const px = x * ts + ts / 2;
                        const py = y * ts + ts / 2;
                        this.dummy.position.set(px, py, 0);
                        this.dummy.updateMatrix();

                        if (block === 'water') {
                            this.waterMesh.setMatrixAt(waterCount, this.dummy.matrix);
                            this.instanceMap[x][y] = { index: waterCount, type: 'water', mesh: 'water' };
                            waterCount++;
                        } else {
                            const data = BlockRegistry.get(block);
                            if (!data || data.tileIndex === undefined) {
                                this.instanceMap[x][y] = null;
                                continue;
                            }
                            this.terrainMesh.setMatrixAt(count, this.dummy.matrix);
                            texIndexAttr.setX(count, data.tileIndex);
                            this.instanceMap[x][y] = { index: count, type: block, mesh: 'terrain' };
                            count++;
                        }
                    }
                }

                this.terrainMesh.count = count;
                this.terrainMesh.instanceMatrix.needsUpdate = true;
                texIndexAttr.needsUpdate = true;
                this.waterMesh.count = waterCount;
                this.waterMesh.instanceMatrix.needsUpdate = true;
                console.log('[three] 世界构建完成，固体:', count, '水:', waterCount);console.log('[three] 世界构建完成，实例数:', count);
            },

            updateBlock(x, y, oldType, newType) {
                const ts = CONFIG.TILE_SIZE;
                const info = this.instanceMap[x][y];
                // 隐藏旧方块
                if (oldType && oldType !== 'air' && info) {
                    if (info.mesh === 'water') {
                        this.waterMesh.setMatrixAt(info.index, this._matrixHide);
                        this.waterMesh.instanceMatrix.needsUpdate = true;
                    } else {
                        this.terrainMesh.setMatrixAt(info.index, this._matrixHide);
                        this.terrainMesh.instanceMatrix.needsUpdate = true;
                    }
                }

                if (newType && newType !== 'air') {
                    const px = x * ts + ts / 2;
                    const py = y * ts + ts / 2;
                    this.dummy.position.set(px, py, 0);
                    this.dummy.rotation.set(0, 0, 0);
                    this.dummy.scale.set(1, 1, 1);
                    this.dummy.updateMatrix();

                    if (newType === 'water') {
                        let idx;
                        if (info && info.mesh === 'water') {
                            idx = info.index;
                        } else {
                            idx = this.waterMesh.count;
                            this.waterMesh.count = idx + 1;
                        }
                        this.waterMesh.setMatrixAt(idx, this.dummy.matrix);
                        this.waterMesh.instanceMatrix.needsUpdate = true;
                        this.instanceMap[x][y] = { index: idx, type: 'water', mesh: 'water' };
                    } else {
                        const data = BlockRegistry.get(newType);
                        if (!data || data.tileIndex === undefined) return;
                        let idx;
                        if (info && info.mesh === 'terrain') {
                            idx = info.index;
                        } else {
                            idx = this.terrainMesh.count;
                            this.terrainMesh.count = idx + 1;
                        }
                        this.terrainMesh.setMatrixAt(idx, this.dummy.matrix);
                        this.terrainMesh.geometry.attributes.aTileIndex.setX(idx, data.tileIndex);
                        this.terrainMesh.instanceMatrix.needsUpdate = true;
                        this.terrainMesh.geometry.attributes.aTileIndex.needsUpdate = true;
                        this.instanceMap[x][y] = { index: idx, type: newType, mesh: 'terrain' };
                    }
                } else {
                    this.instanceMap[x][y] = null;
                }
            },

            updateCamera() {
                const c = State.camera;
                const w = window.innerWidth;
                const h = window.innerHeight;
                this.camera.left   = c.x;
                this.camera.right  = c.x + w * c.zoom;
                this.camera.bottom = c.y;
                this.camera.top    = c.y + h * c.zoom;
                this.camera.updateProjectionMatrix();
            },

            updateHighlight() {
                const mx = State.mouseWorldX;
                const my = State.mouseWorldY;
                if (mx < 0 || mx >= CONFIG.WORLD_WIDTH || my < 0 || my >= CONFIG.WORLD_HEIGHT) {
                    this.highlightMesh.visible = false;
                    return;
                }
                const ts = CONFIG.TILE_SIZE;
                this.highlightMesh.position.set(mx * ts + ts / 2, my * ts + ts / 2, 0);
                this.highlightMesh.visible = true;
                // 高亮颜色：鼠标按键优先，触屏用 State.isDigging
                const isDigging = InputState.actionMode === 'dig' ||
                                  (InputState.actionMode === null && State.isDigging);
                const color = isDigging ? 0xff5050 : 0xffff64;
                this.highlightMesh.material.color.setHex(color);
            },

            updateWater() {
                if (this.waterUniforms) {
                    this.waterUniforms.uTime.value = performance.now() / 1000.0;
                }
            },

            updateStars() {
                if (!this.stars || !this.starBase) return;
                const positions = this.stars.geometry.attributes.position.array;
                const cw = window.innerWidth;
                const ch = window.innerHeight;
                if (cw <= 0 || ch <= 0) return;
                const cx = State.camera.x || 0;
                const cy = State.camera.y || 0;
                const zoom = State.camera.zoom || 1;
                const viewW = cw * zoom;
                const viewH = ch * zoom;
                for (let i = 0; i < this.starBase.length; i++) {
                    const b = this.starBase[i];
                    const sx = ((b.x + cx * 0.1) % viewW + viewW) % viewW;
                    const screenY = b.y % (viewH * 0.6);
                    positions[i * 3]     = cx + sx;
                    positions[i * 3 + 1] = cy + viewH - screenY;
                    positions[i * 3 + 2] = -2;
                }
                this.stars.geometry.attributes.position.needsUpdate = true;
            },

            render() {
                if (!this.renderer) return;
                this.updateWater();
                this.updateHighlight();
                this.updateStars();
                this.renderer.render(this.scene, this.camera);
            },

            resize() {
                if (!this.renderer) return;
                const w = window.innerWidth;
                const h = window.innerHeight;
                DOM.canvas.width  = w;
                DOM.canvas.height = h;
                this.renderer.setSize(w, h);
                this.updateCamera();
            }
        };

        // ============================================================
        //  MODULE: World
        //  左下坐标系：y=0 是地底，y=H-1 是天空
        //  生成逻辑直接按此语义写，零翻转
        // ============================================================
        const World = {
            init() {
                const W = CONFIG.WORLD_WIDTH;
                const H = CONFIG.WORLD_HEIGHT;
                const T = TerrainConfig;
                const noise = SimplexNoise;

                const biomeNoise = (x) => noise.fbm(x, 0, 2, T.BIOME.FREQ, 0.5);

                for (let x = 0; x < W; x++) {
                    State.world[x] = [];

                    const bVal = biomeNoise(x);
                    const isDesert = bVal > T.BIOME.DESERT_THRESHOLD;
                    const isSnow = bVal < T.BIOME.SNOW_THRESHOLD;

                    const nLow  = noise.fbm(x, 0, 2, T.SURFACE.FREQ_LOW,  0.5);
                    const nHigh = noise.fbm(x, 100, 2, T.SURFACE.FREQ_HIGH, 0.5);
                    const nLow01  = (nLow + 1) * 0.5;
                    const nHigh01 = (nHigh + 1) * 0.5;
                    const surfaceNorm = nLow01 * 0.8 + nHigh01 * 0.2;
                    const surface = Math.min(
                        H - 5,
                        Math.floor(T.SURFACE.MAX_HEIGHT * surfaceNorm)
                    );

                    const grassDepth = Math.floor(
                        T.LAYERS.GRASS_DEPTH_MIN +
                        Math.abs(noise.noise2D(x * 0.15, 30)) *
                        (T.LAYERS.GRASS_DEPTH_MAX - T.LAYERS.GRASS_DEPTH_MIN)
                    );
                    const dirtDepth = Math.floor(
                        T.LAYERS.DIRT_DEPTH_MIN +
                        Math.abs(noise.noise2D(x * 0.1, 50)) *
                        (T.LAYERS.DIRT_DEPTH_MAX - T.LAYERS.DIRT_DEPTH_MIN)
                    );

                    for (let y = 0; y < H; y++) {
                        const depth = surface - y;
                        let block;

                        if (y >= surface) {
                            block = 'air';
                        } else if (depth < grassDepth) {
                            block = isDesert ? 'sand' : (isSnow ? 'ice' : 'grass');
                        } else if (depth < grassDepth + dirtDepth) {
                            block = isDesert ? 'sand' : 'dirt';
                        } else {
                            block = 'stone';
                        }

                        State.world[x][y] = block;
                    }
                }

                State.player.x = CONFIG.RESPAWN.x * CONFIG.TILE_SIZE;
                State.player.y = CONFIG.RESPAWN.y * CONFIG.TILE_SIZE;
                State.player.vx = 0;
                State.player.vy = 0;

                console.log('[world] 世界初始化完成，尺寸:', W, 'x', H);
                console.log('[world] 玩家初始位置:', CONFIG.RESPAWN.x, CONFIG.RESPAWN.y);
            },

            // 矩阵第0行=顶部（所见即所得），内部翻转成左下坐标系
            placeStructure(matrix, startX, startY) {
                const charMap = {
                    '气': 'air', '水': 'water', '土': 'dirt', '石': 'stone',
                    '草': 'grass', '木': 'wood', '沙': 'sand', '台': 'platform'
                };
                const rows = matrix.length;
                for (let row = 0; row < rows; row++) {
                    const line = matrix[row];
                    const worldY = startY + (rows - 1 - row);
                    for (let col = 0; col < line.length; col++) {
                        const ch = line[col];
                        const type = charMap[ch];
                        if (type && type !== 'air') {
                            const wx = startX + col;
                            if (wx >= 0 && wx < CONFIG.WORLD_WIDTH && worldY >= 0 && worldY < CONFIG.WORLD_HEIGHT) {
                                this.setBlock(wx, worldY, type);
                            }
                        }
                    }
                }
                console.log('[world] 结构生成完成:', startX, startY, matrix.length + 'x' + matrix[0].length);
            },

            getBlock(x, y) {
                if (x < 0 || x >= CONFIG.WORLD_WIDTH || y < 0 || y >= CONFIG.WORLD_HEIGHT) return null;
                return State.world[x][y];
            },

            setBlock(x, y, type) {
                if (x < 0 || x >= CONFIG.WORLD_WIDTH || y < 0 || y >= CONFIG.WORLD_HEIGHT) return;
                const oldType = State.world[x][y];
                State.world[x][y] = type;
                ThreeJSRenderer.updateBlock(x, y, oldType, type);
            },

            isSolid(x, y) {
                const block = this.getBlock(x, y);
                if (block === null) return false;
                return BlockRegistry.isSolid(block);
            }
        };

        // ============================================================
        //  MODULE: Camera
        // ============================================================
        const Camera = {
            update(dt) {
                const c = State.camera;
                if (State.freeCamera) {
                    // 自由相机模式：方向键/摇杆直接移动相机
                    const speed = 600 * c.zoom;
                    if (State.keys.left)  c.x -= speed * dt;
                    if (State.keys.right) c.x += speed * dt;
                    if (State.keys.up)    c.y += speed * dt;
                    if (State.keys.down)  c.y -= speed * dt;
                    return;
                }
                const p = State.player;
                const cw = window.innerWidth;
                const ch = window.innerHeight;
                const halfW = (cw / 2) * c.zoom;
                const halfH = (ch / 2) * c.zoom;
                c.x = p.x + p.w / 2 - halfW;
                c.y = p.y + p.h / 2 - halfH;
            },

            // 唯一翻转点：屏幕坐标系(Y向下) → 世界坐标系(Y向上)
            screenToWorld(sx, sy) {
                const ch = window.innerHeight;
                const zoom = State.camera.zoom;
                return {
                    x: Math.floor((State.camera.x + sx * zoom) / CONFIG.TILE_SIZE),
                    y: Math.floor((State.camera.y + (ch - sy) * zoom) / CONFIG.TILE_SIZE)
                };
            }
        };


        // ============================================================
        //  MODULE: PlayerRenderer (Three.js Group)
        // ============================================================
        const PlayerRenderer = {
            group: null,
            body: null,
            head: null,
            eye: null,
            footL: null,
            footR: null,
            tool: null,

            init() {
                this.group = new THREE.Group();

                // Group 中心在玩家 AABB 中心 (p.x+w/2, p.y+h/2, 0)
                // 部件相对偏移 = 期望世界位置 - AABB 中心
                // AABB 中心 y = p.y + 24 (h=48)
                // 身体中心 y=p.y+16 → 相对=-8; 头中心 y=p.y+40 → 相对=+16
                // 脚中心 y=p.y+4 → 相对=-20; 工具中心 y=p.y+24 → 相对=0

                // 身体 24x32
                const bodyGeo = new THREE.BoxGeometry(24, 32, 1);
                const bodyMat = new THREE.MeshBasicMaterial({ color: 0x4a90d9 });
                this.body = new THREE.Mesh(bodyGeo, bodyMat);
                this.body.position.set(0, -8, 0);
                this.group.add(this.body);

                // 头 20x16
                const headGeo = new THREE.BoxGeometry(20, 16, 1);
                const headMat = new THREE.MeshBasicMaterial({ color: 0xffccaa });
                this.head = new THREE.Mesh(headGeo, headMat);
                this.head.position.set(0, 16, 0);
                this.group.add(this.head);

                // 眼睛 4x4
                const eyeGeo = new THREE.BoxGeometry(4, 4, 1);
                const eyeMat = new THREE.MeshBasicMaterial({ color: 0x333333 });
                this.eye = new THREE.Mesh(eyeGeo, eyeMat);
                this.eye.position.set(4, 13, 0.6);
                this.group.add(this.eye);

                // 左脚 8x8
                const footGeo = new THREE.BoxGeometry(8, 8, 1);
                const footMat = new THREE.MeshBasicMaterial({ color: 0x3a5080 });
                this.footL = new THREE.Mesh(footGeo, footMat);
                this.footL.position.set(-6, -20, 0);
                this.group.add(this.footL);

                // 右脚 8x8
                this.footR = new THREE.Mesh(footGeo, footMat);
                this.footR.position.set(6, -20, 0);
                this.group.add(this.footR);

                // 工具 Group
                this.tool = new THREE.Group();
                const handleGeo = new THREE.BoxGeometry(24, 6, 1);
                const handleMat = new THREE.MeshBasicMaterial({ color: 0x888888 });
                const handle = new THREE.Mesh(handleGeo, handleMat);
                handle.position.set(12, 0, 0);
                this.tool.add(handle);
                const toolHeadGeo = new THREE.BoxGeometry(8, 14, 1);
                const toolHeadMat = new THREE.MeshBasicMaterial({ color: 0xaaaaaa });
                const toolHead = new THREE.Mesh(toolHeadGeo, toolHeadMat);
                toolHead.position.set(28, 0, 0);
                this.tool.add(toolHead);
                this.tool.position.set(0, 0, 0);
                this.group.add(this.tool);

                this.group.renderOrder = 0;
                this.group.traverse(child => {
                    child.renderOrder = 0;
                    if (child.isMesh) {
                        child.material.transparent = true;
                        child.material.depthTest = false;
                        child.material.depthWrite = false;
                    }
                });
                ThreeJSRenderer.scene.add(this.group);
                console.log('[player] 玩家渲染器初始化完成');
            },

            update() {
                const p = State.player;
                // Group 中心对齐玩家 AABB 中心
                this.group.position.set(p.x + p.w / 2, p.y + p.h / 2, 1);

                // 朝向：眼睛 x 偏移 + 工具 scale.x 镜像
                if (p.facingRight) {
                    this.eye.position.x = 4;
                    this.tool.scale.x = 1;
                } else {
                    this.eye.position.x = -4;
                    this.tool.scale.x = -1;
                }
            }
        };


        // ============================================================
        //  MODULE: Physics
        // ============================================================
        const Physics = {
            checkCollision(px, py, pw, ph) {
                const ts = CONFIG.TILE_SIZE;
                const left   = Math.floor(px / ts);
                const right  = Math.floor((px + pw - 1) / ts);
                const bottom = Math.floor(py / ts);
                const top    = Math.floor((py + ph - 1) / ts);
                for (let tx = left; tx <= right; tx++) {
                    for (let ty = bottom; ty <= top; ty++) {
                        const block = World.getBlock(tx, ty);
                        if (block === 'platform') continue;
                        if (World.isSolid(tx, ty)) return true;
                    }
                }
                return false;
            },

            checkInWater(p) {
                const ts = CONFIG.TILE_SIZE;
                const left   = Math.floor(p.x / ts);
                const right  = Math.floor((p.x + p.w - 1) / ts);
                const bottom = Math.floor(p.y / ts);
                const top    = Math.floor((p.y + p.h - 1) / ts);
                for (let tx = left; tx <= right; tx++) {
                    for (let ty = bottom; ty <= top; ty++) {
                        if (World.getBlock(tx, ty) === 'water') return true;
                    }
                }
                return false;
            },

            update(dt) {
                if (State.freeCamera) return;
                const p = State.player;
                const ts = CONFIG.TILE_SIZE;
                const drop = State.dropThrough;

                const inWater = this.checkInWater(p);
                const waterSpeed = inWater ? CONFIG.MOVE_SPEED * CONFIG.WATER.MOVE_SCALE : 0;

                const approach = (curr, target, drag, dt) => {
                    return curr + (target - curr) * (1 - Math.pow(drag, dt * 60));
                };

                // 下跳
                if (State.keys.down && State.keys.jump && p.onGround) {
                    const footX = Math.floor((p.x + p.w / 2) / ts);
                    const footY = Math.floor(p.y / ts) - 1;
                    if (World.getBlock(footX, footY) === 'platform') {
                        drop.active = true;
                        drop.elapsed = 0;
                        p.onGround = false;
                        console.log('[physics] 启动下跳穿过平台');
                    }
                }
                if (drop.active) {
                    drop.elapsed += dt;
                    if (drop.elapsed >= drop.duration) {
                        drop.active = false;
                        console.log('[physics] 下跳结束');
                    }
                }

                if (inWater) {
                    let targetVx = 0;
                    if (State.keys.left)  { targetVx = -waterSpeed; p.facingRight = false; }
                    else if (State.keys.right) { targetVx = waterSpeed; p.facingRight = true; }
                    p.vx = approach(p.vx, targetVx, CONFIG.WATER.DRAG, dt);
                    if (Math.abs(p.vx) < 1) p.vx = 0;

                    if (State.keys.up || State.keys.down) {
                        let targetVy = 0;
                        if (State.keys.up)    targetVy = waterSpeed;
                        else if (State.keys.down) targetVy = -waterSpeed;
                        p.vy = approach(p.vy, targetVy, CONFIG.WATER.DRAG, dt);
                    } else {
                        p.vy -= CONFIG.GRAVITY * CONFIG.WATER.GRAVITY_SCALE * dt;
                    }
                    if (p.vy > CONFIG.WATER.MAX_SPEED) p.vy = CONFIG.WATER.MAX_SPEED;
                    if (p.vy < -CONFIG.WATER.MAX_SPEED) p.vy = -CONFIG.WATER.MAX_SPEED;
                } else {
                    let targetVx = 0;
                    const moveSpeed = (State.keys.sprint && (State.keys.left || State.keys.right))
                        ? CONFIG.MOVE_SPEED * CONFIG.SPRINT_SPEED
                        : CONFIG.MOVE_SPEED;
                    if (State.keys.left)  { targetVx = -moveSpeed; p.facingRight = false; }
                    else if (State.keys.right) { targetVx = moveSpeed; p.facingRight = true; }

                    // 脚底摩擦力检测
                    const footX = Math.floor((p.x + p.w / 2) / ts);
                    const footY = Math.floor(p.y / ts) - 1;
                    const standingBlock = World.getBlock(footX, footY);
                    const blockData = BlockRegistry.get(standingBlock);
                    const drag = (blockData && blockData.friction)
                        ? blockData.friction
                        : CONFIG.AIR_DRAG;

                    p.vx = approach(p.vx, targetVx, drag, dt);
                    if (Math.abs(p.vx) < 1) p.vx = 0;

                    if (State.keys.jump && p.onGround) {
                        p.vy = CONFIG.JUMP_FORCE;
                        p.onGround = false;
                    }

                    p.vy -= CONFIG.GRAVITY * dt;
                    if (p.vy < -CONFIG.MAX_FALL_SPEED) p.vy = -CONFIG.MAX_FALL_SPEED;
                }

                // 水平碰撞
                const newX = p.x + p.vx * dt;
                if (!this.checkCollision(newX, p.y, p.w, p.h)) {
                    p.x = newX;
                } else {
                    if (p.onGround) {
                        const stepY = p.y + CONFIG.TILE_SIZE;
                        if (!this.checkCollision(newX, stepY, p.w, p.h)) {
                            p.y = stepY;
                            p.x = newX;
                            p.vy = 0;
                            console.log('[physics] 台阶上升:', Math.floor(p.x), Math.floor(p.y));
                        } else {
                            p.vx = 0;
                        }
                    } else {
                        p.vx = 0;
                    }
                }

                // 垂直碰撞
                const newY = p.y + p.vy * dt;
                if (!this.checkCollision(p.x, newY, p.w, p.h)) {
                    p.y = newY;
                    p.onGround = false;

                    // 平台 snap
                    if (p.vy < 0 && !drop.active) {
                        const footLeft  = Math.floor(p.x / ts);
                        const footRight = Math.floor((p.x + p.w - 1) / ts);
                        const footY     = Math.floor(p.y / ts);
                        for (let fx = footLeft; fx <= footRight; fx++) {
                            if (World.getBlock(fx, footY) === 'platform') {
                                const platTop = (footY + 1) * ts;
                                const prevBottom = p.y - p.vy * dt;
                                if (prevBottom >= platTop && p.y <= platTop + 4) {
                                    p.y = platTop;
                                    p.vy = 0;
                                    p.onGround = true;
                                    console.log('[physics] 平台 snap:', fx, footY);
                                    break;
                                }
                            }
                        }
                    }
                } else {
                    if (p.vy < 0) p.onGround = true;
                    p.vy = 0;
                }
            }
        };

        // ============================================================
        //  MODULE: LongPressHandler
        // ============================================================
        const LongPressHandler = {
            timer: null,
            repeatTimer: null,
            start(onEnter, onRepeat, delay, interval) {
                this.end();
                this.timer = setTimeout(() => {
                    this.timer = null;
                    onEnter();
                    onRepeat();
                    this.repeatTimer = setInterval(onRepeat, interval);
                }, delay);
            },
            end() {
                if (this.timer) { clearTimeout(this.timer); this.timer = null; }
                if (this.repeatTimer) { clearInterval(this.repeatTimer); this.repeatTimer = null; }
            }
        };

        // ============================================================
        //  MODULE: Input
        // ============================================================
        const Input = {
            PinchState: {
                isPinching: false,
                startDist: 0,
                startZoom: 1,
                startCenter: { x: 0, y: 0 },
                lastCenter: { x: 0, y: 0 }
            },
            init() {
                DOM.canvas.addEventListener('contextmenu', (e) => e.preventDefault());
                DOM.canvas.addEventListener('pointerdown', (e) => {
                    if (this.PinchState.isPinching) return;
                    e.preventDefault();
                    DOM.canvas.setPointerCapture(e.pointerId);
                    this.onCanvasStart(e);
                });
                DOM.canvas.addEventListener('pointermove', (e) => {
                    this.onCanvasMove(e);
                    if (e.pointerType !== 'touch') this.onCanvasHover(e);
                });
                DOM.canvas.addEventListener('pointerup', (e) => {
                    DOM.canvas.releasePointerCapture(e.pointerId);
                    this.onCanvasEnd(e);
                });
                DOM.canvas.addEventListener('pointerleave', (e) => {
                    if (InputState.isTouchDown) this.onCanvasEnd(e);
                });
                DOM.canvas.addEventListener('pointercancel', (e) => {
                    DOM.canvas.releasePointerCapture(e.pointerId);
                    this.onCanvasEnd(e);
                });
                DOM.canvas.addEventListener('wheel', (e) => {
                    e.preventDefault();
                    const delta = e.deltaY > 0 ? 1.1 : 0.9;
                    const cw = window.innerWidth;
                    const ch = window.innerHeight;
                    const cx = cw / 2;
                    const cy = ch / 2;
                    const worldX = State.camera.x + cx * State.camera.zoom;
                    const worldY = State.camera.y + (ch - cy) * State.camera.zoom;
                    State.camera.zoom *= delta;
                    State.camera.x = worldX - cx * State.camera.zoom;
                    State.camera.y = worldY - (ch - cy) * State.camera.zoom;
                }, { passive: false });

                // 双指缩放（仅统计在画布上的手指，UI上的手指不计入）
                DOM.canvas.addEventListener('touchstart', (e) => {
                    const canvasTouches = Array.from(e.touches).filter(t => t.target === DOM.canvas);
                    if (canvasTouches.length >= 2) {
                        const ps = this.PinchState;
                        ps.isPinching = true;
                        InputState.isTouchDown = false;
                        InputState.lastGridX = -1;
                        InputState.lastGridY = -1;
                        const t0 = canvasTouches[0];
                        const t1 = canvasTouches[1];
                        ps.startDist = Math.hypot(t1.clientX - t0.clientX, t1.clientY - t0.clientY);
                        ps.startZoom = State.camera.zoom;
                        ps.startCenter = { x: (t0.clientX + t1.clientX) / 2, y: (t0.clientY + t1.clientY) / 2 };
                        ps.lastCenter = { ...ps.startCenter };
                        e.preventDefault();
                    }
                }, { passive: false });
                DOM.canvas.addEventListener('touchmove', (e) => {
                    if (!this.PinchState.isPinching) return;
                    const canvasTouches = Array.from(e.touches).filter(t => t.target === DOM.canvas);
                    if (canvasTouches.length < 2) return;
                    e.preventDefault();
                    const ps = this.PinchState;
                    const t0 = canvasTouches[0];
                    const t1 = canvasTouches[1];
                    const newDist = Math.hypot(t1.clientX - t0.clientX, t1.clientY - t0.clientY);
                    const newCenter = { x: (t0.clientX + t1.clientX) / 2, y: (t0.clientY + t1.clientY) / 2 };
                    const ratio = ps.startDist / newDist;
                    const newZoom = ps.startZoom * ratio;
                    const cw = window.innerWidth;
                    const ch = window.innerHeight;
                    const cx = cw / 2;
                    const cy = ch / 2;
                    const worldX = State.camera.x + cx * State.camera.zoom;
                    const worldY = State.camera.y + (ch - cy) * State.camera.zoom;
                    State.camera.zoom = newZoom;
                    State.camera.x = worldX - cx * newZoom;
                    State.camera.y = worldY - (ch - cy) * newZoom;
                    ps.lastCenter = { ...newCenter };
                }, { passive: false });
                DOM.canvas.addEventListener('touchend', (e) => {
                    if (e.touches.length < 2) this.PinchState.isPinching = false;
                });
                DOM.canvas.addEventListener('touchcancel', (e) => {
                    this.PinchState.isPinching = false;
                });

                DOM.dpadBtns.forEach(btn => {
                    const key = btn.dataset.key;
                    const down = (e) => { e.preventDefault(); State.keys[key] = true; };
                    const up   = (e) => { State.keys[key] = false; };
                    btn.addEventListener('pointerdown', down);
                    btn.addEventListener('pointerup',   up);
                    btn.addEventListener('pointerleave',up);
                    btn.addEventListener('pointercancel',up);
                });

                window.addEventListener('keydown', this.onKeyDown.bind(this));
                window.addEventListener('keyup',   this.onKeyUp.bind(this));

                const jumpDown = (e) => { e.preventDefault(); State.keys.jump = true; };
                const jumpUp   = (e) => { State.keys.jump = false; };
                DOM.jumpBtn.addEventListener('pointerdown', jumpDown);
                DOM.jumpBtn.addEventListener('pointerup',   jumpUp);
                DOM.jumpBtn.addEventListener('pointerleave',jumpUp);
                DOM.jumpBtn.addEventListener('pointercancel',jumpUp);

                DOM.actionBtn.addEventListener('pointerdown', (e) => {
                    e.preventDefault();
                    State.isDigging = !State.isDigging;
                    DOM.actionBtn.textContent = State.isDigging ? '⛏' : '🧱';
                    DOM.actionBtn.style.background = State.isDigging
                        ? 'rgba(180, 60, 60, 0.7)'
                        : 'rgba(60, 120, 60, 0.7)';
                    DOM.actionBtn.style.borderColor = State.isDigging ? '#a05050' : '#50a050';
                });

                console.log('[input] 输入系统初始化完成 (Pointer Events)');
            },

            getCanvasCoords(e) {
                const rect = DOM.canvas.getBoundingClientRect();
                return { x: e.clientX - rect.left, y: e.clientY - rect.top };
            },

            doRepeatAction() {
                const coords = Camera.screenToWorld(InputState.touchCurrentX, InputState.touchCurrentY);
                State.mouseWorldX = coords.x;
                State.mouseWorldY = coords.y;
                if (coords.x < 0 || coords.x >= CONFIG.WORLD_WIDTH || coords.y < 0 || coords.y >= CONFIG.WORLD_HEIGHT) return;

                // 操作模式：鼠标按键优先，触屏用 State.isDigging
                const isDigging = InputState.actionMode === 'dig' ||
                                  (InputState.actionMode === null && State.isDigging);

                if (isDigging) {
                    World.setBlock(coords.x, coords.y, 'air');
                } else {
                    const p = State.player;
                    const ts = CONFIG.TILE_SIZE;
                    const bx = coords.x * ts;
                    const by = coords.y * ts;
                    const overlap = !(bx + ts <= p.x || bx >= p.x + p.w || by + ts <= p.y || by >= p.y + p.h);
                    if (!overlap) {
                        World.setBlock(coords.x, coords.y, State.selectedBlock);
                    }
                }
            },

            onCanvasStart(e) {
                if (this.PinchState.isPinching) return;
                e.preventDefault();
                InputState.isTouchDown = true;
                const coords = this.getCanvasCoords(e);
                InputState.touchStartX = coords.x;
                InputState.touchStartY = coords.y;
                InputState.touchCurrentX = coords.x;
                InputState.touchCurrentY = coords.y;
                InputState.lastGridX = -1;
                InputState.lastGridY = -1;

                if (State.freeCamera) return; // 自由相机禁止交互

                // 鼠标按键决定操作模式：左键挖掘，右键放置
                if (e.pointerType === 'mouse') {
                    if (e.button === 0) InputState.actionMode = 'dig';
                    else if (e.button === 2) InputState.actionMode = 'place';
                    else { InputState.isTouchDown = false; return; } // 中键忽略
                } else {
                    InputState.actionMode = null; // 触屏用 State.isDigging
                }

                this.doRepeatAction();
            },

            onCanvasMove(e) {
                if (!InputState.isTouchDown) return;
                const coords = this.getCanvasCoords(e);
                InputState.touchCurrentX = coords.x;
                InputState.touchCurrentY = coords.y;

                if (State.freeCamera) {
                    // 自由相机模式：滑动平移相机
                    const dx = coords.x - InputState.touchStartX;
                    const dy = coords.y - InputState.touchStartY;
                    const zoom = State.camera.zoom;
                    State.camera.x -= dx * zoom;
                    State.camera.y += dy * zoom;
                    InputState.touchStartX = coords.x;
                    InputState.touchStartY = coords.y;
                    return;
                }

                const sw = Camera.screenToWorld(coords.x, coords.y);
                State.mouseWorldX = sw.x;
                State.mouseWorldY = sw.y;
                if (sw.x !== InputState.lastGridX || sw.y !== InputState.lastGridY) {
                    InputState.lastGridX = sw.x;
                    InputState.lastGridY = sw.y;
                    if (!State.freeCamera) this.doRepeatAction();
                }
            },

            onCanvasEnd(e) {
                InputState.isTouchDown = false;
                InputState.lastGridX = -1;
                InputState.lastGridY = -1;
                InputState.actionMode = null;
                console.log('[input] 画布操作结束');
            },

            onCanvasHover(e) {
                if (InputState.isTouchDown) return;
                const rect = DOM.canvas.getBoundingClientRect();
                State.mouseScreenX = e.clientX - rect.left;
                State.mouseScreenY = e.clientY - rect.top;
                const sw = Camera.screenToWorld(State.mouseScreenX, State.mouseScreenY);
                State.mouseWorldX = sw.x;
                State.mouseWorldY = sw.y;
            },

            onKeyDown(e) {
                switch (e.code) {
                    case 'ArrowLeft':  case 'KeyA': State.keys.left  = true; break;
                    case 'ArrowRight': case 'KeyD': State.keys.right = true; break;
                    case 'ArrowUp':    case 'KeyW': State.keys.up    = true; break;
                    case 'ArrowDown':  case 'KeyS': State.keys.down  = true; break;
                    case 'KeyK':       case 'Space': State.keys.jump = true; break;
                    case 'ShiftLeft':  case 'ShiftRight': State.keys.sprint = !State.keys.sprint; break;
                    case 'KeyV':
                        State.freeCamera = !State.freeCamera;
                        console.log('[camera] 自由相机模式:', State.freeCamera ? '开启' : '关闭');
                        break;
                }
            },

            onKeyUp(e) {
                switch (e.code) {
                    case 'ArrowLeft':  case 'KeyA': State.keys.left  = false; break;
                    case 'ArrowRight': case 'KeyD': State.keys.right = false; break;
                    case 'ArrowUp':    case 'KeyW': State.keys.up    = false; break;
                    case 'ArrowDown':  case 'KeyS': State.keys.down  = false; break;
                    case 'KeyK':       case 'Space': State.keys.jump = false; break;
                    // Toggle 模式：Shift 在 keydown 时切换，keyup 不处理
                }
            }
        };

        // ============================================================
        //  MODULE: Fullscreen
        // ============================================================
        const Fullscreen = {
            getElement() {
                return document.fullscreenElement || document.webkitFullscreenElement || document.mozFullScreenElement || document.msFullscreenElement || null;
            },
            isSupported() {
                const el = document.documentElement;
                return !!(el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen || el.msRequestFullscreen);
            },
            async enter() {
                const el = document.documentElement;
                try {
                    if (el.requestFullscreen) await el.requestFullscreen();
                    else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
                    else if (el.mozRequestFullScreen) el.mozRequestFullScreen();
                    else if (el.msRequestFullscreen) el.msRequestFullscreen();
                } catch (err) { console.warn('[fullscreen] 进入全屏失败:', err); throw err; }
            },
            async exit() {
                try {
                    if (document.exitFullscreen) await document.exitFullscreen();
                    else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
                    else if (document.mozCancelFullScreen) document.mozCancelFullScreen();
                    else if (document.msExitFullscreen) document.msExitFullscreen();
                } catch (err) { console.warn('[fullscreen] 退出全屏失败:', err); throw err; }
            },
            async lockLandscape() {
                if (screen.orientation && screen.orientation.lock) { try { await screen.orientation.lock('landscape'); } catch (e) {} }
            },
            async unlockOrientation() {
                if (screen.orientation && screen.orientation.unlock) { try { screen.orientation.unlock(); } catch (e) {} }
            },
            updateBtn() {
                const btn = DOM.fullscreenBtn;
                if (this.getElement()) {
                    btn.innerHTML = '⛶'; btn.style.borderColor = '#88ff88'; btn.style.background = 'rgba(30, 60, 30, 0.85)'; btn.title = '退出全屏';
                } else {
                    btn.innerHTML = '⛶'; btn.style.borderColor = '#4a4a6a'; btn.style.background = 'rgba(30, 30, 50, 0.85)'; btn.title = '全屏切换';
                }
            },
            showFeedback(success) {
                const btn = DOM.fullscreenBtn;
                const oldBg = btn.style.background;
                btn.style.background = success ? 'rgba(60, 120, 60, 0.9)' : 'rgba(180, 60, 60, 0.9)';
                setTimeout(() => { btn.style.background = oldBg; this.updateBtn(); }, 300);
            },
            init() {
                DOM.fullscreenBtn.addEventListener('click', async () => {
                    if (this.getElement()) {
                        try { await this.exit(); await this.unlockOrientation(); this.showFeedback(true); }
                        catch (err) { this.showFeedback(false); }
                    } else {
                        try { await this.enter(); await this.lockLandscape(); this.showFeedback(true); }
                        catch (err) {
                            this.showFeedback(false);
                            if (!this.isSupported()) { try { await this.lockLandscape(); } catch (e2) {} }
                        }
                    }
                });
                ['fullscreenchange', 'webkitfullscreenchange', 'mozfullscreenchange', 'MSFullscreenChange'].forEach(evt => {
                    document.addEventListener(evt, () => this.updateBtn());
                });
                this.updateBtn();
                console.log('[fullscreen] 全屏控制初始化完成');
            }
        };

        // ============================================================
        //  MODULE: GameLoop
        // ============================================================
        const GameLoop = {
            lastTime: 0,
            fps: { frames: 0, lastTime: 0, value: 0 },
            tick(time) {
                if (!this.lastTime) this.lastTime = time;
                let dt = (time - this.lastTime) / 1000;
                this.lastTime = time;
                if (dt > 0.1) dt = 0.1;
                if (dt <= 0) dt = 0.001;
                State.frameCount++;

                // FPS 计算
                this.fps.frames++;
                if (time - this.fps.lastTime >= 1000) {
                    this.fps.value = this.fps.frames;
                    this.fps.frames = 0;
                    this.fps.lastTime = time;
                }
                Physics.update(dt);
                Camera.update(dt);
                PlayerRenderer.update();
                ThreeJSRenderer.updateCamera();
                ThreeJSRenderer.render();
                DOM.coordsEl.textContent = 'X:' + Math.floor(State.player.x / CONFIG.TILE_SIZE)
                                         + ' Y:' + Math.floor(State.player.y / CONFIG.TILE_SIZE);
                if (DOM.mouseCoordsEl) {
                    const mx = State.mouseWorldX;
                    const my = State.mouseWorldY;
                    DOM.mouseCoordsEl.textContent = 'MX:' + (mx >= 0 ? mx : '--') + ' MY:' + (my >= 0 ? my : '--');
                }
                if (DOM.zoomEl) DOM.zoomEl.textContent = 'Z:' + State.camera.zoom.toFixed(1);
                if (DOM.fpsEl) DOM.fpsEl.textContent = 'FPS:' + this.fps.value;
                if (DOM.modeEl) DOM.modeEl.textContent = State.freeCamera ? '[自由]' : '[跟随]';
                requestAnimationFrame((t) => this.tick(t));
            },
            start() {
                console.log('[loop] 游戏循环启动');
                this.lastTime = 0;
                requestAnimationFrame((t) => this.tick(t));
            }
        };

        // ============================================================
        //  MODULE: App
        // ============================================================
        const App = {
            init() {
                console.log('[app] ====== My Terraria v2 启动 (直观左下坐标系) ======');
                initDOM();
                this.resize();
                window.addEventListener('resize', () => this.resize());

                const selector = document.getElementById('blockSelector');
                BlockRegistry.getAllPlaceable().forEach((type) => {
                    const data = window.BlockRegistry.get(type);
                    const btn = document.createElement('div');
                    btn.className = 'block-btn' + (type === State.selectedBlock ? ' selected' : '');
                    btn.style.background = data.uiColor || data.color || '#888';
                    btn.dataset.type = type;
                    btn.title = data.tooltip || type;
                    btn.textContent = data.icon || type[0];
                    btn.addEventListener('click', () => {
                        document.querySelectorAll('.block-btn').forEach(b => b.classList.remove('selected'));
                        btn.classList.add('selected');
                        State.selectedBlock = type;
                        console.log('[input] 切换方块:', type);
                    });
                    selector.appendChild(btn);
                });

                // 背包格子生成（36格，8列）
                const INV_SLOTS = 36;
                for (let i = 0; i < INV_SLOTS; i++) {
                    const slot = document.createElement('div');
                    slot.className = 'inv-slot';
                    slot.dataset.index = i;
                    DOM.inventoryGrid.appendChild(slot);
                }
                console.log('[app] 背包格子生成:', INV_SLOTS);

                // 背包开关
                DOM.inventoryBtn.addEventListener('click', () => {
                    DOM.inventoryPanel.classList.toggle('open');
                    console.log('[ui] 背包' + (DOM.inventoryPanel.classList.contains('open') ? '打开' : '关闭'));
                });
                DOM.inventoryClose.addEventListener('click', () => {
                    DOM.inventoryPanel.classList.remove('open');
                });
                // E键开关背包
                window.addEventListener('keydown', (e) => {
                    if (e.code === 'KeyE') {
                        DOM.inventoryPanel.classList.toggle('open');
                    }
                });

                // 抽屉开关
                DOM.drawerToggle.addEventListener('click', () => {
                    const isOpen = DOM.sideDrawer.classList.toggle('open');
                    DOM.drawerToggle.classList.toggle('open', isOpen);
                    DOM.drawerToggle.textContent = isOpen ? '▶' : '◀';
                    console.log('[ui] 侧栏' + (isOpen ? '打开' : '关闭'));
                });

                // Tab 切换
                document.querySelectorAll('.tab-btn').forEach(tabBtn => {
                    tabBtn.addEventListener('click', () => {
                        const tab = tabBtn.dataset.tab;
                        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                        tabBtn.classList.add('active');
                        document.querySelector('.tab-content[data-tab="' + tab + '"]').classList.add('active');

                    });

                ConsoleModule.init();
                ThreeJSRenderer.init();
                World.init();
                ThreeJSRenderer.buildWorld();
                PlayerRenderer.init();

                // 地形 Tab 控件绑定
                const rebuildBtn = document.getElementById('rebuildBtn');
                const worldHeightRange = document.getElementById('worldHeightRange');
                const worldHeightVal = document.getElementById('worldHeightVal');
                const terrainHeightRange = document.getElementById('terrainHeightRange');
                const terrainHeightVal = document.getElementById('terrainHeightVal');

                if (worldHeightRange && worldHeightVal) {
                    worldHeightRange.value = CONFIG.WORLD_HEIGHT;
                    worldHeightVal.textContent = CONFIG.WORLD_HEIGHT;
                    worldHeightRange.addEventListener('input', (e) => {
                        const val = parseInt(e.target.value, 10);
                        CONFIG.WORLD_HEIGHT = val;
                        worldHeightVal.textContent = val;
                        console.log('[terrain] 世界高度调整为:', val);
                    });
                }

                if (terrainHeightRange && terrainHeightVal) {
                    terrainHeightRange.value = TerrainConfig.SURFACE.MAX_HEIGHT;
                    terrainHeightVal.textContent = TerrainConfig.SURFACE.MAX_HEIGHT;
                    terrainHeightRange.addEventListener('input', (e) => {
                        const val = parseInt(e.target.value, 10);
                        TerrainConfig.SURFACE.MAX_HEIGHT = val;
                        terrainHeightVal.textContent = val;
                        console.log('[terrain] 地形高度调整为:', val);
                    });
                }

                const dirtMinRange = document.getElementById('dirtMinRange');
                const dirtMinVal = document.getElementById('dirtMinVal');
                const dirtMaxRange = document.getElementById('dirtMaxRange');
                const dirtMaxVal = document.getElementById('dirtMaxVal');
                if (dirtMinRange && dirtMinVal && dirtMaxRange && dirtMaxVal) {
                    dirtMinRange.value = TerrainConfig.LAYERS.DIRT_DEPTH_MIN;
                    dirtMinVal.textContent = TerrainConfig.LAYERS.DIRT_DEPTH_MIN;
                    dirtMaxRange.value = TerrainConfig.LAYERS.DIRT_DEPTH_MAX;
                    dirtMaxVal.textContent = TerrainConfig.LAYERS.DIRT_DEPTH_MAX;
                    dirtMinRange.addEventListener('input', (e) => {
                        const val = parseInt(e.target.value, 10);
                        if (val > TerrainConfig.LAYERS.DIRT_DEPTH_MAX) {
                            TerrainConfig.LAYERS.DIRT_DEPTH_MAX = val;
                            dirtMaxRange.value = val;
                            dirtMaxVal.textContent = val;
                        }
                        TerrainConfig.LAYERS.DIRT_DEPTH_MIN = val;
                        dirtMinVal.textContent = val;
                        console.log('[terrain] 泥土厚度 MIN 调整为:', val);
                    });
                    dirtMaxRange.addEventListener('input', (e) => {
                        const val = parseInt(e.target.value, 10);
                        if (val < TerrainConfig.LAYERS.DIRT_DEPTH_MIN) {
                            TerrainConfig.LAYERS.DIRT_DEPTH_MIN = val;
                            dirtMinRange.value = val;
                            dirtMinVal.textContent = val;
                        }
                        TerrainConfig.LAYERS.DIRT_DEPTH_MAX = val;
                        dirtMaxVal.textContent = val;
                        console.log('[terrain] 泥土厚度 MAX 调整为:', val);
                    });
                }

                const grassMinRange = document.getElementById('grassMinRange');
                const grassMinVal = document.getElementById('grassMinVal');
                const grassMaxRange = document.getElementById('grassMaxRange');
                const grassMaxVal = document.getElementById('grassMaxVal');
                if (grassMinRange && grassMinVal && grassMaxRange && grassMaxVal) {
                    grassMinRange.value = TerrainConfig.LAYERS.GRASS_DEPTH_MIN;
                    grassMinVal.textContent = TerrainConfig.LAYERS.GRASS_DEPTH_MIN;
                    grassMaxRange.value = TerrainConfig.LAYERS.GRASS_DEPTH_MAX;
                    grassMaxVal.textContent = TerrainConfig.LAYERS.GRASS_DEPTH_MAX;
                    grassMinRange.addEventListener('input', (e) => {
                        const val = parseInt(e.target.value, 10);
                        if (val > TerrainConfig.LAYERS.GRASS_DEPTH_MAX) {
                            TerrainConfig.LAYERS.GRASS_DEPTH_MAX = val;
                            grassMaxRange.value = val;
                            grassMaxVal.textContent = val;
                        }
                        TerrainConfig.LAYERS.GRASS_DEPTH_MIN = val;
                        grassMinVal.textContent = val;
                        console.log('[terrain] 表层厚度 MIN 调整为:', val);
                    });
                    grassMaxRange.addEventListener('input', (e) => {
                        const val = parseInt(e.target.value, 10);
                        if (val < TerrainConfig.LAYERS.GRASS_DEPTH_MIN) {
                            TerrainConfig.LAYERS.GRASS_DEPTH_MIN = val;
                            grassMinRange.value = val;
                            grassMinVal.textContent = val;
                        }
                        TerrainConfig.LAYERS.GRASS_DEPTH_MAX = val;
                        grassMaxVal.textContent = val;
                        console.log('[terrain] 表层厚度 MAX 调整为:', val);
                    });
                }

                if (rebuildBtn) {
                    rebuildBtn.addEventListener('click', () => {
                        const oldHeight = State.world[0] ? State.world[0].length : CONFIG.WORLD_HEIGHT;
                        console.log('[terrain] 重建地形... 旧高度:', oldHeight, '新高度:', CONFIG.WORLD_HEIGHT);
                        for (let x = 0; x < CONFIG.WORLD_WIDTH; x++) {
                            State.world[x] = [];
                        }
                        const terrainMesh = ThreeJSRenderer.terrainMesh;
                        const waterMesh = ThreeJSRenderer.waterMesh;
                        for (let i = 0; i < terrainMesh.count; i++) {
                            terrainMesh.setMatrixAt(i, ThreeJSRenderer._matrixHide);
                        }
                        terrainMesh.instanceMatrix.needsUpdate = true;
                        for (let i = 0; i < waterMesh.count; i++) {
                            waterMesh.setMatrixAt(i, ThreeJSRenderer._matrixHide);
                        }
                        waterMesh.instanceMatrix.needsUpdate = true;
                        for (let x = 0; x < CONFIG.WORLD_WIDTH; x++) {
                            ThreeJSRenderer.instanceMap[x] = [];
                            for (let y = 0; y < CONFIG.WORLD_HEIGHT; y++) {
                                ThreeJSRenderer.instanceMap[x][y] = null;
                            }
                        }
                        World.init();
                        ThreeJSRenderer.buildWorld();
                        // 如果世界高度降低，清空旧的多余部分
                        if (CONFIG.WORLD_HEIGHT < oldHeight) {
                            for (let x = 0; x < CONFIG.WORLD_WIDTH; x++) {
                                for (let y = CONFIG.WORLD_HEIGHT; y < oldHeight; y++) {
                                    State.world[x][y] = 'air';
                                    const info = ThreeJSRenderer.instanceMap[x][y];
                                    if (info) {
                                        if (info.mesh === 'water') {
                                            waterMesh.setMatrixAt(info.index, ThreeJSRenderer._matrixHide);
                                        } else {
                                            terrainMesh.setMatrixAt(info.index, ThreeJSRenderer._matrixHide);
                                        }
                                        ThreeJSRenderer.instanceMap[x][y] = null;
                                    }
                                }
                            }
                            terrainMesh.instanceMatrix.needsUpdate = true;
                            waterMesh.instanceMatrix.needsUpdate = true;
                        }
                        State.player.x = CONFIG.RESPAWN.x * CONFIG.TILE_SIZE;
                        State.player.y = CONFIG.RESPAWN.y * CONFIG.TILE_SIZE;
                        State.player.vx = 0;
                        State.player.vy = 0;
                        console.log('[terrain] 地形重建完成');
                    });
                }

                Input.init();
                Fullscreen.init();
                GameLoop.start();
                // 设备检测：PC 隐藏操作 GUI
                const isMobile = window.matchMedia('(pointer: coarse)').matches;
                if (!isMobile) {
                    document.querySelectorAll('.game-gui').forEach(el => el.style.display = 'none');
                    console.log('[app] PC 模式：操作 GUI 已隐藏');
                } else {
                    console.log('[app] 移动端模式：操作 GUI 已显示');
                }

                console.log('[app] 初始化全部完成');
            },

            resize() {
                ThreeJSRenderer.resize();
                const panel = DOM.consolePanel;
                if (panel && !panel.classList.contains('collapsed')) {
                    const h = window.innerHeight;
                    const w = window.innerWidth;
                    if (w > h && h < 500) panel.style.height = '120px';
                    else if (w > h && h < 600) panel.style.height = '150px';
                    else panel.style.height = '';
                }
            }
        };

        // 方块注册（必须在 TextureGenerator 之前）
        BlockRegistry.register('air',      { color: null,               solid: false, icon: '',   tooltip: '空气' });
        BlockRegistry.register('dirt',     { color: '#8B6F47',           solid: true,  icon: '土',   tooltip: '泥土',     uiColor: '#8B4513' });
        BlockRegistry.register('stone',    { color: '#7a7a85',           solid: true,  icon: '石',   tooltip: '石头',     uiColor: '#708090' });
        BlockRegistry.register('grass',    { color: '#4a8c3f',           solid: true,  icon: '草',   tooltip: '草',       uiColor: '#228B22' });
        BlockRegistry.register('wood',     { color: '#a07040',           solid: true,  icon: '木',   tooltip: '木头',     uiColor: '#D2691E' });
        BlockRegistry.register('sand',     { color: '#d4b896',           solid: true,  icon: '沙',   tooltip: '沙子',     uiColor: '#FFD700' });
        BlockRegistry.register('water',    { color: 'rgba(65,105,225,0.6)', solid: false, icon: '水',   tooltip: '水',       uiColor: '#4169E1' });
        BlockRegistry.register('platform', { color: '#C4956A',           solid: true,  icon: '台',   tooltip: '平台',     uiColor: '#C4956A' });
        BlockRegistry.register('ice',      { color: '#ADD8E6',           solid: true,  icon: '冰',   tooltip: '冰',       uiColor: '#ADD8E6', friction: 0.98 });
        console.log('[app] 方块注册完成:', BlockRegistry.getAllPlaceable().join(', '));

        window.App = App;

    })();
    </script>

    <script>
    // ============================================================
    //  MODULE: TextureGenerator（与主代码解耦）
    // ============================================================
    // ============================================================
    //  MODULE: TextureGenerator
    // ============================================================
    const TextureGenerator = {
        atlasCanvas: null,
        atlasCtx: null,
        atlasTexture: null,
        tileSize: 32,
        atlasWidth: 1024,
        atlasHeight: 32,

        init() {
            this.atlasCanvas = document.createElement('canvas');
            this.atlasCanvas.height = this.atlasHeight;
            this.atlasCtx = this.atlasCanvas.getContext('2d');
            console.log('[texture] 图集生成器初始化');
        },

        generate(type) {
            const s = this.tileSize;
            const c = document.createElement('canvas');
            c.width = s;
            c.height = s;
            const ctx = c.getContext('2d');
            const data = window.BlockRegistry.get(type);
            if (!data) return c;

            // 基底
            ctx.fillStyle = data.color;
            ctx.fillRect(0, 0, s, s);

            // 通用边框（除 platform/water 外）
            if (type !== 'platform' && type !== 'water') {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
                ctx.fillRect(0, 0, s, 2);
                ctx.fillRect(0, 0, 2, s);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.08)';
                ctx.fillRect(s - 2, 0, 2, s);
                ctx.fillRect(0, s - 2, s, 2);
                if (type === 'dirt' || type === 'grass') {
                    ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
                    ctx.fillRect(8, 12, 4, 4);
                    ctx.fillRect(20, 6, 3, 3);
                }
            }

            // platform：32x32 贴图，下方 24px 透明
            if (type === 'platform') {
                ctx.clearRect(0, 0, s, s);
                ctx.fillStyle = '#C4956A';
                // 主体 28x6（留出左右 2px 圆角）
                ctx.fillRect(2, 1, 28, 6);
                // 像素级圆角（硬边，无抗锯齿）
                ctx.fillRect(1, 2, 1, 4);   // 左
                ctx.fillRect(30, 2, 1, 4);  // 右
                ctx.fillRect(2, 0, 28, 1);  // 上
                ctx.fillRect(2, 7, 28, 1);  // 下
                // 顶部深色边线
                ctx.fillStyle = '#A07850';
                ctx.fillRect(2, 0, 28, 2);
                // 侧面阴影
                ctx.fillStyle = 'rgba(0,0,0,0.2)';
                ctx.fillRect(0, 0, 2, 8);
                ctx.fillRect(30, 0, 2, 8);
                // 木纹细节
                ctx.fillStyle = 'rgba(0,0,0,0.12)';
                ctx.fillRect(10, 3, 6, 1);
                ctx.fillRect(20, 5, 8, 1);
                ctx.fillRect(6, 7, 10, 1);
                // 底部高光
                ctx.fillStyle = 'rgba(255,255,255,0.08)';
                ctx.fillRect(2, 7, 28, 1);
            }

            // water：静态蓝底 + 顶部高光条
            if (type === 'water') {
                ctx.fillStyle = 'rgba(65, 105, 225, 0.6)';
                ctx.fillRect(0, 0, s, s);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.1)';
                ctx.fillRect(0, 0, s, 2);
            }

            // ice：浅蓝 + 白色高光条纹
            if (type === 'ice') {
                ctx.fillStyle = '#ADD8E6';
                ctx.fillRect(0, 0, s, s);
                ctx.fillStyle = 'rgba(255,255,255,0.3)';
                ctx.fillRect(4, 4, 8, 2);
                ctx.fillRect(16, 12, 10, 2);
                ctx.fillRect(8, 20, 6, 2);
                ctx.fillRect(22, 26, 4, 2);
                ctx.fillStyle = 'rgba(0,0,0,0.08)';
                ctx.fillRect(0, 0, s, 1);
                ctx.fillRect(0, 0, 1, s);
                ctx.fillStyle = 'rgba(255,255,255,0.15)';
                ctx.fillRect(s-1, 0, 1, s);
                ctx.fillRect(0, s-1, s, 1);
            }

            return c;
        },

        buildAtlas() {
            const types = ['dirt', 'stone', 'grass', 'sand', 'wood', 'platform', 'water', 'ice'];
            const s = this.tileSize;
            const tilesPerRow = Math.floor(this.atlasWidth / s);
            const rows = Math.ceil(types.length / tilesPerRow);
            this.atlasHeight = rows * s;
            this.atlasCanvas.width = this.atlasWidth;
            this.atlasCanvas.height = this.atlasHeight;
            this.atlasCtx.imageSmoothingEnabled = false;
            this.atlasCtx.clearRect(0, 0, this.atlasWidth, this.atlasHeight);
            types.forEach((type, i) => {
                const tile = this.generate(type);
                const col = i % tilesPerRow;
                const row = Math.floor(i / tilesPerRow);
                this.atlasCtx.drawImage(tile, col * s, row * s);
                const data = window.BlockRegistry.get(type);
                if (data) data.tileIndex = i;
            });
            console.log('[texture] 图集构建完成:', types.join(', '), '| 网格:', tilesPerRow + 'x' + rows, '| 尺寸:', this.atlasWidth + 'x' + this.atlasHeight);
            window.__ATLAS_TILES_PER_ROW = tilesPerRow;
            window.__ATLAS_ROWS = rows;
            return this.atlasCanvas;
        },

        getTexture() {
            if (!this.atlasTexture) {
                this.atlasTexture = new THREE.CanvasTexture(this.atlasCanvas);
                this.atlasTexture.magFilter = THREE.NearestFilter;
                this.atlasTexture.minFilter = THREE.NearestFilter;
            }
            return this.atlasTexture;
        },

        preview() {
            const url = this.atlasCanvas.toDataURL();
            const div = document.createElement('div');
            div.style.cssText = 'position:fixed;top:60px;left:12px;z-index:9998;background:#1e1e1e;border:2px solid #444;padding:8px;border-radius:4px;cursor:pointer;';
            const img = document.createElement('img');
            img.src = url;
            img.style.cssText = 'image-rendering:pixelated;width:224px;height:32px;';
            div.appendChild(img);
            const label = document.createElement('div');
            label.textContent = '图集预览 (224x32) 点击关闭';
            label.style.cssText = 'color:#888;font-size:11px;margin-top:4px;text-align:center;';
            div.appendChild(label);
            div.addEventListener('click', () => div.remove());
            document.body.appendChild(div);
            console.log('[texture] 预览已显示，点击关闭');
            return url;
        }
    };



    // 初始化纹理图集，然后启动主应用
    TextureGenerator.init();
    TextureGenerator.buildAtlas();
    window.__ATLAS_TEXTURE = TextureGenerator.getTexture();
    if (window.App) window.App.init();
    else console.error('[texture] App 未定义，无法启动');
    </script>
