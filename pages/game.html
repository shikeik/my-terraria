<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Terraria v2 - Three.js 2D 直观坐标</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: none; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: linear-gradient(to bottom, #1a1a3e 0%, #2d2d5a 50%, #4a4a7a 100%); font-family: 'Courier New', monospace; }
        #gameCanvas { display: block; width: 100%; height: 100%; image-rendering: pixelated; image-rendering: crisp-edges; }
        #fullscreenBtn { position: fixed; top: calc(12px + env(safe-area-inset-top)); right: calc(12px + env(safe-area-inset-right)); width: 44px; height: 44px; background: rgba(30, 30, 50, 0.85); border: 2px solid #4a4a6a; border-radius: 8px; color: #e0e0e0; font-size: 20px; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 1000; backdrop-filter: blur(4px); user-select: none; }
        #fullscreenBtn:active { background: rgba(50, 50, 80, 0.9); border-color: #6a6a9a; transform: scale(0.95); }
        #info { position: fixed; top: calc(12px + env(safe-area-inset-top)); left: calc(12px + env(safe-area-inset-left)); color: #aaa; font-size: 12px; z-index: 1000; text-shadow: 1px 1px 0 #000; pointer-events: none; }
        #controls { position: fixed; bottom: calc(20px + env(safe-area-inset-bottom)); left: calc(20px + env(safe-area-inset-left)); z-index: 1000; display: flex; gap: 12px; }
        .dpad { position: relative; width: 140px; height: 140px; }
        .dpad-btn { position: absolute; width: 44px; height: 44px; background: rgba(30, 30, 50, 0.7); border: 2px solid #4a4a6a; border-radius: 8px; color: #aaa; font-size: 18px; display: flex; align-items: center; justify-content: center; user-select: none; }
        .dpad-btn:active { background: rgba(60, 60, 100, 0.8); border-color: #7a7aaa; }
        .dpad-up    { top: 0; left: 48px; }
        .dpad-down  { bottom: 0; left: 48px; }
        .dpad-left  { top: 48px; left: 0; }
        .dpad-right { top: 48px; right: 0; }
        #actionBtn { position: fixed; bottom: calc(30px + env(safe-area-inset-bottom)); right: calc(30px + env(safe-area-inset-right)); width: 70px; height: 70px; background: rgba(180, 60, 60, 0.7); border: 3px solid #a05050; border-radius: 50%; color: #fff; font-size: 14px; font-weight: bold; display: flex; align-items: center; justify-content: center; z-index: 1000; user-select: none; }
        #actionBtn:active { background: rgba(220, 80, 80, 0.9); transform: scale(0.92); }
        #jumpBtn { position: fixed; bottom: calc(110px + env(safe-area-inset-bottom)); right: calc(30px + env(safe-area-inset-right)); width: 60px; height: 60px; background: rgba(60, 120, 180, 0.7); border: 3px solid #5080a0; border-radius: 50%; color: #fff; font-size: 22px; display: flex; align-items: center; justify-content: center; z-index: 1000; user-select: none; }
        #jumpBtn:active { background: rgba(80, 160, 220, 0.9); transform: scale(0.92); }
        #blockSelector { position: fixed; top: calc(70px + env(safe-area-inset-top)); right: calc(12px + env(safe-area-inset-right)); display: flex; flex-direction: column; gap: 6px; z-index: 1000; }
        .block-btn { width: 36px; height: 36px; border: 2px solid #4a4a6a; border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 10px; color: #fff; text-shadow: 1px 1px 0 #000; }
        .block-btn.selected { border-color: #ffff88; box-shadow: 0 0 8px rgba(255, 255, 136, 0.4); }
        #consolePanel { position: fixed; bottom: 0; left: 0; right: 0; background: #1e1e1e; border-top: 1px solid #444; z-index: 9999; display: flex; flex-direction: column; font-family: 'Courier New', monospace; font-size: 13px; transition: height 0.2s ease; height: clamp(140px, 25vh, 220px); touch-action: auto; }
        #consolePanel.collapsed { height: 32px !important; padding-bottom: env(safe-area-inset-bottom); touch-action: none; }
        #consolePanel.collapsed #consoleContent, #consolePanel.collapsed #consoleInputWrap { display: none; }
        #consolePanel.collapsed #consoleToggle { transform: rotate(180deg); }
        #consoleHeader { height: 32px; background: #2d2d2d; border-bottom: 1px solid #444; display: flex; align-items: center; justify-content: space-between; padding: 0 12px; flex-shrink: 0; user-select: none; cursor: pointer; }
        #consoleTitle { color: #ccc; font-weight: bold; font-size: 13px; }
        #consoleHeaderRight { display: flex; align-items: center; gap: 14px; }
        #consoleClear, #consoleAuto, #consoleCopy, #consoleToggle { color: #888; font-size: 12px; cursor: pointer; }
        #consoleCopy:active { color: #75beff; }
        #consoleAuto.auto-on { color: #88ff88; }
        #consoleAuto.auto-off { color: #ff8888; text-decoration: line-through; }
        #consoleToggle { transition: transform 0.2s; }
        #consoleContent { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 6px 10px; padding-bottom: calc(6px + env(safe-area-inset-bottom)); color: #d4d4d4; line-height: 1.5; -webkit-overflow-scrolling: touch; touch-action: pan-y; min-height: 0; overscroll-behavior: contain; }
        #consoleContent .log-line { margin-bottom: 2px; word-break: break-all; white-space: pre-wrap; }
        #consoleContent .log-log   { color: #d4d4d4; }
        #consoleContent .log-warn  { color: #ffcc00; }
        #consoleContent .log-error { color: #ff4444; }
        #consoleContent .log-info  { color: #75beff; }
        #consoleContent .log-time { color: #666; font-size: 11px; margin-right: 6px; }
        #consoleInputWrap { height: 36px; border-top: 1px solid #444; display: flex; align-items: center; padding: 0 10px; flex-shrink: 0; background: #1e1e1e; }
        #consolePrompt { color: #888; margin-right: 8px; font-size: 14px; }
        #consoleInput { flex: 1; background: transparent; border: none; outline: none; color: #d4d4d4; font-family: 'Courier New', monospace; font-size: 13px; }
        #consoleInput::placeholder { color: #555; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<base target="_blank">
</head>
<body>
    <div id="fullscreenBtn" title="全屏切换">⛶</div>
    <div id="info">
        <div>⛏ 挖掘 / 🖱 放置</div>
        <div id="coords">X:0 Y:0</div>
        <div id="fps">FPS: 0</div>
    </div>
    <div id="blockSelector"></div>
    <div id="controls">
        <div class="dpad">
            <div class="dpad-btn dpad-up"    data-key="up">▲</div>
            <div class="dpad-btn dpad-down"  data-key="down">▼</div>
            <div class="dpad-btn dpad-left"  data-key="left">◀</div>
            <div class="dpad-btn dpad-right" data-key="right">▶</div>
        </div>
    </div>
    <div id="jumpBtn">⬆️</div>
    <div id="actionBtn">⛏</div>
    <canvas id="gameCanvas"></canvas>
    <div id="consolePanel" class="collapsed">
        <div id="consoleHeader">
            <span id="consoleTitle">控制台</span>
            <div id="consoleHeaderRight">
                <span id="consoleAuto" class="auto-on">auto</span>
                <span id="consoleCopy">复制</span>
                <span id="consoleClear">清空</span>
                <span id="consoleToggle">▼</span>
            </div>
        </div>
        <div id="consoleContent"></div>
        <div id="consoleInputWrap">
            <span id="consolePrompt">&gt;</span>
            <input type="text" id="consoleInput" placeholder="输入JS代码..." autocomplete="off" spellcheck="false">
        </div>
    </div>

    <script>
    (function() {
        "use strict";

        // ============================================================
        //  MODULE: Config
        // ============================================================
        const CONFIG = {
            TILE_SIZE: 32,
            WORLD_WIDTH: 200,
            WORLD_HEIGHT: 100,
            GRAVITY: 2000,
            JUMP_FORCE: 660,
            MOVE_SPEED: 350,
            MAX_FALL_SPEED: 1200,
            LONG_PRESS_DELAY: 300,
            REPEAT_INTERVAL: 80,
            LONG_PRESS_MOVE_THRESHOLD: 20,
            RESPAWN: { x: 2, y: 86 },
            WATER: {
                MOVE_SCALE: 0.4,
                DRAG: 0.95,
                GRAVITY_SCALE: 0.1,
                MAX_SPEED: 500,
                BUOYANCY: 600
            },
            AIR_DRAG: 0.8
        };
        window.__CONFIG = CONFIG;

        // ============================================================
        //  MODULE: BlockRegistry
        // ============================================================
        const BlockRegistry = {
            _blocks: {},
            register(type, config) { this._blocks[type] = config; },
            get(type) { return this._blocks[type] || null; },
            isSolid(type) { const d = this._blocks[type]; return d ? d.solid : false; },
            getAllPlaceable() { return Object.keys(this._blocks).filter(k => k !== 'air'); }
        };
        window.BlockRegistry = BlockRegistry;


        // ============================================================
        //  MODULE: State
        // ============================================================
        const State = {
            world: [],
            player: {
                x: 0, y: 0, w: 24, h: 48,
                vx: 0, vy: 0,
                onGround: false,
                facingRight: true
            },
            camera: { x: 0, y: 0, zoom: 1.0 },
            keys: { up: false, down: false, left: false, right: false, jump: false },
            selectedBlock: 'dirt',
            isDigging: true,
            isPlacing: false,
            mouseWorldX: -1,
            mouseWorldY: -1,
            mouseScreenX: 0,
            mouseScreenY: 0,
            frameCount: 0,
            dropThrough: { active: false, elapsed: 0, duration: 0.2 }
        };

        const InputState = {
            isTouchDown: false,
            touchStartX: 0, touchStartY: 0,
            touchCurrentX: 0, touchCurrentY: 0,
            lastGridX: -1,
            lastGridY: -1
        };

        // ============================================================
        //  MODULE: DOM
        // ============================================================
        const DOM = {};
        function initDOM() {
            DOM.canvas         = document.getElementById('gameCanvas');
            DOM.coordsEl       = document.getElementById('coords');
            DOM.fpsEl          = document.getElementById('fps');
            DOM.fullscreenBtn  = document.getElementById('fullscreenBtn');
            DOM.actionBtn      = document.getElementById('actionBtn');
            DOM.jumpBtn        = document.getElementById('jumpBtn');
            DOM.blockBtns      = document.querySelectorAll('.block-btn');
            DOM.dpadBtns       = document.querySelectorAll('.dpad-btn');
            DOM.consolePanel   = document.getElementById('consolePanel');
            DOM.consoleContent = document.getElementById('consoleContent');
            DOM.consoleInput   = document.getElementById('consoleInput');
            DOM.consoleHeader  = document.getElementById('consoleHeader');
            DOM.consoleAuto    = document.getElementById('consoleAuto');
            DOM.consoleClear   = document.getElementById('consoleClear');
            DOM.consoleCopy    = document.getElementById('consoleCopy');
            DOM.consoleToggle  = document.getElementById('consoleToggle');
            console.log('[dom] DOM 引用初始化完成');
        }

        // ============================================================
        //  MODULE: ThreeJSRenderer
        // ============================================================
        const ThreeJSRenderer = {
            scene: null,
            camera: null,
            renderer: null,
            solidMeshes: {},
            waterMesh: null,
            instanceMap: [],
            dummy: new THREE.Object3D(),
            _matrixHide: new THREE.Matrix4().makeScale(0,0,0),

            init() {
                const canvas = DOM.canvas;
                const w = window.innerWidth;
                const h = window.innerHeight;
                canvas.width  = w;
                canvas.height = h;

                this.scene = new THREE.Scene();
                this.camera = new THREE.OrthographicCamera(0, w, 0, h, 1, 1000);
                this.camera.position.z = 10;

                this.renderer = new THREE.WebGLRenderer({ canvas: canvas, alpha: true, antialias: false });
                this.renderer.setSize(w, h);
                this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                this.renderer.setClearColor(0x000000, 0);

                const maxCount = CONFIG.WORLD_WIDTH * CONFIG.WORLD_HEIGHT;
                const geo = new THREE.BoxGeometry(CONFIG.TILE_SIZE, CONFIG.TILE_SIZE, 1);

                // 统一地形 ShaderMaterial：图集 + 水波动
                const atlas = window.__ATLAS_TEXTURE || new THREE.Texture();
                const terrainShader = {
                    uniforms: {
                        uTime: { value: 0.0 },
                        uAtlas: { value: atlas }
                    },
                    vertexShader: `
                        uniform float uTime;
                        attribute float aTileIndex;
                        varying vec2 vUv;
                        varying float vTileIndex;
                        varying float vWorldX;
                        varying float vWorldY;
                        void main() {
                            vUv = uv;
                            vTileIndex = aTileIndex;
                            float worldX = instanceMatrix[3][0];
                            float worldY = instanceMatrix[3][1];
                            vWorldX = worldX / 32.0;
                            vWorldY = worldY / 32.0;
                            vec3 pos = position;
                            // water 波动（tileIndex 6）
                            if (aTileIndex == 6.0) {
                                float wave = sin(uTime * 2.0 + vWorldX * 0.5) * 2.0;
                                pos.y += wave;
                            }
                            gl_Position = projectionMatrix * modelViewMatrix * instanceMatrix * vec4(pos, 1.0);
                        }
                    `,
                    fragmentShader: `
                        uniform float uTime;
                        uniform sampler2D uAtlas;
                        varying vec2 vUv;
                        varying float vTileIndex;
                        varying float vWorldX;
                        varying float vWorldY;
                        void main() {
                            vec2 atlasUv = vec2((vTileIndex + vUv.x) / 7.0, vUv.y);
                            vec4 tex = texture2D(uAtlas, atlasUv);
                            if (vTileIndex == 6.0) {
                                // water 动态 alpha + 高光
                                float alpha = 0.5 + sin(uTime * 3.0 + vWorldX * 0.7 + vWorldY * 0.5) * 0.15;
                                float hl = 0.1 + sin(uTime * 4.0 + vWorldX) * 0.05;
                                float isTop = step(0.9375, vUv.y);
                                vec3 color = mix(tex.rgb, vec3(1.0, 1.0, 1.0), isTop * hl);
                                gl_FragColor = vec4(color, alpha);
                            } else {
                                gl_FragColor = tex;
                            }
                        }
                    `
                };
                const terrainMat = new THREE.ShaderMaterial({
                    uniforms: terrainShader.uniforms,
                    vertexShader: terrainShader.vertexShader,
                    fragmentShader: terrainShader.fragmentShader,
                    transparent: true,
                    depthTest: false,
                    depthWrite: false
                });
                this.terrainMesh = new THREE.InstancedMesh(geo, terrainMat, maxCount);
                this.terrainMesh.renderOrder = 0;
                this.terrainMesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
                // aTileIndex 实例属性
                const tileIndices = new Float32Array(maxCount);
                this.terrainMesh.geometry.setAttribute('aTileIndex', new THREE.InstancedBufferAttribute(tileIndices, 1));
                this.scene.add(this.terrainMesh);
                this.terrainUniforms = terrainShader.uniforms;

                for (let x = 0; x < CONFIG.WORLD_WIDTH; x++) {
                    this.instanceMap[x] = [];
                    for (let y = 0; y < CONFIG.WORLD_HEIGHT; y++) {
                        this.instanceMap[x][y] = null;
                    }
                }

                // 高亮框
                const hlGeo = new THREE.BoxGeometry(CONFIG.TILE_SIZE, CONFIG.TILE_SIZE, 1);
                const hlEdges = new THREE.EdgesGeometry(hlGeo);
                const hlMat = new THREE.LineBasicMaterial({ color: 0xff5050, transparent: true, opacity: 0.8, depthTest: false, depthWrite: false });
                this.highlightMesh = new THREE.LineSegments(hlEdges, hlMat);
                this.highlightMesh.visible = false;
                this.highlightMesh.renderOrder = 2;
                this.scene.add(this.highlightMesh);

                // 星星
                const starCount = 50;
                const starGeo = new THREE.BufferGeometry();
                const starPos = new Float32Array(starCount * 3);
                starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
                const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 2, transparent: true, opacity: 0.3 });
                this.stars = new THREE.Points(starGeo, starMat);
                this.stars.renderOrder = -1;
                this.scene.add(this.stars);
                this.starBase = [];
                for (let i = 0; i < starCount; i++) {
                    this.starBase.push({ x: (i * 137.5) % 10000, y: (i * 73.3) % 10000 });
                }

                console.log('[three] Three.js 初始化完成（统一图集）');
            },

            buildWorld() {
                const ts = CONFIG.TILE_SIZE;
                const W = CONFIG.WORLD_WIDTH;
                const H = CONFIG.WORLD_HEIGHT;
                let count = 0;

                // 全部隐藏
                for (let i = 0; i < this.terrainMesh.count; i++) {
                    this.terrainMesh.setMatrixAt(i, this._matrixHide);
                }
                this.terrainMesh.instanceMatrix.needsUpdate = true;
                const tileIndexAttr = this.terrainMesh.geometry.attributes.aTileIndex;

                for (let x = 0; x < W; x++) {
                    for (let y = 0; y < H; y++) {
                        const block = State.world[x][y];
                        if (block === 'air' || !block) {
                            this.instanceMap[x][y] = null;
                            continue;
                        }
                        const data = BlockRegistry.get(block);
                        if (!data || data.tileIndex === undefined) {
                            this.instanceMap[x][y] = null;
                            continue;
                        }

                        const px = x * ts + ts / 2;
                        const py = y * ts + ts / 2;
                        this.dummy.position.set(px, py, 0);
                        this.dummy.updateMatrix();

                        this.terrainMesh.setMatrixAt(count, this.dummy.matrix);
                        tileIndexAttr.setX(count, data.tileIndex);
                        this.instanceMap[x][y] = { index: count, type: block };
                        count++;
                    }
                }

                this.terrainMesh.count = count;
                this.terrainMesh.instanceMatrix.needsUpdate = true;
                tileIndexAttr.needsUpdate = true;
                console.log('[three] 世界构建完成，实例数:', count);
            },

            updateBlock(x, y, oldType, newType) {
                const ts = CONFIG.TILE_SIZE;
                const info = this.instanceMap[x][y];
                const tileIndexAttr = this.terrainMesh.geometry.attributes.aTileIndex;

                if (oldType && oldType !== 'air' && info) {
                    this.terrainMesh.setMatrixAt(info.index, this._matrixHide);
                    this.terrainMesh.instanceMatrix.needsUpdate = true;
                }

                if (newType && newType !== 'air') {
                    const data = BlockRegistry.get(newType);
                    if (!data || data.tileIndex === undefined) return;

                    const px = x * ts + ts / 2;
                    const py = y * ts + ts / 2;
                    this.dummy.position.set(px, py, 0);
                    this.dummy.rotation.set(0, 0, 0);
                    this.dummy.scale.set(1, 1, 1);
                    this.dummy.updateMatrix();

                    let idx;
                    if (info) {
                        idx = info.index;
                    } else {
                        idx = this.terrainMesh.count;
                        this.terrainMesh.count = idx + 1;
                    }

                    this.terrainMesh.setMatrixAt(idx, this.dummy.matrix);
                    tileIndexAttr.setX(idx, data.tileIndex);
                    this.terrainMesh.instanceMatrix.needsUpdate = true;
                    tileIndexAttr.needsUpdate = true;
                    this.instanceMap[x][y] = { index: idx, type: newType };
                } else {
                    this.instanceMap[x][y] = null;
                }
            },

            updateCamera() {
                const c = State.camera;
                const w = window.innerWidth;
                const h = window.innerHeight;
                this.camera.left   = c.x;
                this.camera.right  = c.x + w * c.zoom;
                this.camera.bottom = c.y;
                this.camera.top    = c.y + h * c.zoom;
                this.camera.updateProjectionMatrix();
            },

            updateHighlight() {
                const mx = State.mouseWorldX;
                const my = State.mouseWorldY;
                if (mx < 0 || mx >= CONFIG.WORLD_WIDTH || my < 0 || my >= CONFIG.WORLD_HEIGHT) {
                    this.highlightMesh.visible = false;
                    return;
                }
                const ts = CONFIG.TILE_SIZE;
                this.highlightMesh.position.set(mx * ts + ts / 2, my * ts + ts / 2, 0);
                this.highlightMesh.visible = true;
                const color = State.isDigging ? 0xff5050 : 0xffff64;
                this.highlightMesh.material.color.setHex(color);
            },

            updateWater() {
                if (this.terrainUniforms) {
                    this.terrainUniforms.uTime.value = performance.now() / 1000.0;
                }
            },

            updateStars() {
                if (!this.stars || !this.starBase) return;
                const positions = this.stars.geometry.attributes.position.array;
                const cw = window.innerWidth;
                const ch = window.innerHeight;
                if (cw <= 0 || ch <= 0) return;
                const cx = State.camera.x || 0;
                const cy = State.camera.y || 0;
                for (let i = 0; i < this.starBase.length; i++) {
                    const b = this.starBase[i];
                    const sx = ((b.x + cx * 0.1) % cw + cw) % cw;
                    const screenY = b.y % (ch * 0.6);
                    positions[i * 3]     = cx + sx;
                    positions[i * 3 + 1] = cy + ch - screenY;
                    positions[i * 3 + 2] = -2;
                }
                this.stars.geometry.attributes.position.needsUpdate = true;
            },

            render() {
                if (!this.renderer) return;
                this.updateWater();
                this.updateHighlight();
                this.updateStars();
                this.renderer.render(this.scene, this.camera);
            },

            resize() {
                if (!this.renderer) return;
                const w = window.innerWidth;
                const h = window.innerHeight;
                DOM.canvas.width  = w;
                DOM.canvas.height = h;
                this.renderer.setSize(w, h);
                this.updateCamera();
            }
        };

        // ============================================================
        //  MODULE: World
        //  左下坐标系：y=0 是地底，y=H-1 是天空
        //  生成逻辑直接按此语义写，零翻转
        // ============================================================
        const World = {
            init() {
                const W = CONFIG.WORLD_WIDTH;
                const H = CONFIG.WORLD_HEIGHT;

                // 原 v65 地表高度从顶部约 15 格
                // 左下坐标系：地表在底部往上约 (H-1 - 15) = 84 处
                const surfaceY = H - 1 - 15;

                for (let x = 0; x < W; x++) {
                    State.world[x] = [];
                    const surface = surfaceY + Math.sin(x * 0.1) * 3 + Math.sin(x * 0.03) * 5;
                    for (let y = 0; y < H; y++) {
                        let block = 'stone';
                        if (y < surface - 5) {
                            block = 'stone';
                        } else if (y < surface - 1) {
                            block = 'dirt';
                        } else if (y < surface) {
                            block = 'grass';
                        } else {
                            block = 'air';
                        }
                        // 洞穴（在地表以下较深位置）
                        if (y < surface - 3 && Math.random() < 0.08) {
                            block = 'air';
                        }
                        // 沙层（在地表以下更深处）
                        if (y < surface - 15 && y > surface - 25 && Math.random() < 0.3) {
                            block = 'sand';
                        }
                        // 水（地表以下的空洞中）
                        if (y < surface - 8 && block === 'air' && Math.random() < 0.05) {
                            block = 'water';
                        }
                        State.world[x][y] = block;
                    }
                }

                // 玩家重生点（左下坐标系）
                State.player.x = CONFIG.RESPAWN.x * CONFIG.TILE_SIZE;
                State.player.y = CONFIG.RESPAWN.y * CONFIG.TILE_SIZE;
                State.player.vx = 0;
                State.player.vy = 0;

                // 测试水体结构：矩阵第0行=顶部（所见即所得），放置时内部翻转
                const pondMatrix = [
                    '气气气气气气气气',  // ← 顶部（天空）
                    '石水水水水水水石',
                    '石水水水水水水石',
                    '石水水水水水水石',
                    '石水水水水水水石',
                    '石水水水水水水石',
                    '石水水水水水水石',
                    '石水水水水水水石',
                    '石水水水水水水石',
                    '石水水水水水水石',

                    '石水水水水水水石',
                    '石水水水水水水石',
                    '石石石石石石石石'   // ← 底部（地底）
                ];
                // 放置到地表附近：surfaceY 约 84，结构高 15，放在 y=70 处
                this.placeStructure(pondMatrix, 5, 70);

                console.log('[world] 世界初始化完成，尺寸:', W, 'x', H);
                console.log('[world] 玩家初始位置:', CONFIG.RESPAWN.x, CONFIG.RESPAWN.y);

            },

            // 矩阵第0行=顶部（所见即所得），内部翻转成左下坐标系
            placeStructure(matrix, startX, startY) {
                const charMap = {
                    '气': 'air', '水': 'water', '土': 'dirt', '石': 'stone',
                    '草': 'grass', '木': 'wood', '沙': 'sand', '台': 'platform'
                };
                const rows = matrix.length;
                for (let row = 0; row < rows; row++) {
                    const line = matrix[row];
                    // 翻转：矩阵第0行（顶部）→ 世界更大的y（上方）
                    const worldY = startY + (rows - 1 - row);
                    for (let col = 0; col < line.length; col++) {
                        const ch = line[col];
                        const type = charMap[ch];
                        if (type && type !== 'air') {
                            const wx = startX + col;
                            if (wx >= 0 && wx < CONFIG.WORLD_WIDTH && worldY >= 0 && worldY < CONFIG.WORLD_HEIGHT) {
                                this.setBlock(wx, worldY, type);
                            }
                        }
                    }
                }
                console.log('[world] 结构生成完成:', startX, startY, matrix.length + 'x' + matrix[0].length);
            },

            getBlock(x, y) {
                if (x < 0 || x >= CONFIG.WORLD_WIDTH || y < 0 || y >= CONFIG.WORLD_HEIGHT) return null;
                return State.world[x][y];
            },

            setBlock(x, y, type) {
                if (x < 0 || x >= CONFIG.WORLD_WIDTH || y < 0 || y >= CONFIG.WORLD_HEIGHT) return;
                const oldType = State.world[x][y];
                State.world[x][y] = type;
                ThreeJSRenderer.updateBlock(x, y, oldType, type);
            },

            isSolid(x, y) {
                const block = this.getBlock(x, y);
                if (block === null) return false;
                return BlockRegistry.isSolid(block);
            }
        };

                const halfH = (ch / 2) * c.zoom;
                c.x = p.x + p.w / 2 - halfW;
                c.y = p.y + p.h / 2 - halfH;
            },

            // 唯一翻转点：屏幕坐标系(Y向下) → 世界坐标系(Y向上)
            screenToWorld(sx, sy) {
                const ch = window.innerHeight;
                const zoom = State.camera.zoom;
                return {
                    x: Math.floor((State.camera.x + sx * zoom) / CONFIG.TILE_SIZE),
                    y: Math.floor((State.camera.y + (ch - sy) * zoom) / CONFIG.TILE_SIZE)
                };
            }
        };

        // ============================================================
        //  MODULE: Physics
        // ============================================================
        const Physics = {
            checkCollision(px, py, pw, ph) {
                const ts = CONFIG.TILE_SIZE;
                const left   = Math.floor(px / ts);
                const right  = Math.floor((px + pw - 1) / ts);
                const bottom = Math.floor(py / ts);
                const top    = Math.floor((py + ph - 1) / ts);
                for (let tx = left; tx <= right; tx++) {
                    for (let ty = bottom; ty <= top; ty++) {
                        const block = World.getBlock(tx, ty);
                        if (block === 'platform') continue;
                        if (World.isSolid(tx, ty)) return true;
                    }
                }
                return false;
            },

            checkInWater(p) {
                const ts = CONFIG.TILE_SIZE;
                const left   = Math.floor(p.x / ts);
                const right  = Math.floor((p.x + p.w - 1) / ts);
                const bottom = Math.floor(p.y / ts);
                const top    = Math.floor((p.y + p.h - 1) / ts);
                for (let tx = left; tx <= right; tx++) {
                    for (let ty = bottom; ty <= top; ty++) {
                        if (World.getBlock(tx, ty) === 'water') return true;
                    }
                }
                return false;
            },

            update(dt) {
                const p = State.player;
                const ts = CONFIG.TILE_SIZE;
                const drop = State.dropThrough;

                const inWater = this.checkInWater(p);
                const waterSpeed = inWater ? CONFIG.MOVE_SPEED * CONFIG.WATER.MOVE_SCALE : 0;

                const approach = (curr, target, drag, dt) => {
                    return curr + (target - curr) * (1 - Math.pow(drag, dt * 60));
                };

                // 下跳
                if (State.keys.down && State.keys.jump && p.onGround) {
                    const footX = Math.floor((p.x + p.w / 2) / ts);
                    const footY = Math.floor(p.y / ts) - 1;
                    if (World.getBlock(footX, footY) === 'platform') {
                        drop.active = true;
                        drop.elapsed = 0;
                        p.onGround = false;
                        console.log('[physics] 启动下跳穿过平台');
                    }
                }
                if (drop.active) {
                    drop.elapsed += dt;
                    if (drop.elapsed >= drop.duration) {
                        drop.active = false;
                        console.log('[physics] 下跳结束');
                    }
                }

                if (inWater) {
                    let targetVx = 0;
                    if (State.keys.left)  { targetVx = -waterSpeed; p.facingRight = false; }
                    else if (State.keys.right) { targetVx = waterSpeed; p.facingRight = true; }
                    p.vx = approach(p.vx, targetVx, CONFIG.WATER.DRAG, dt);
                    if (Math.abs(p.vx) < 1) p.vx = 0;

                    if (State.keys.up || State.keys.down) {
                        let targetVy = 0;
                        if (State.keys.up)    targetVy = waterSpeed;
                        else if (State.keys.down) targetVy = -waterSpeed;
                        p.vy = approach(p.vy, targetVy, CONFIG.WATER.DRAG, dt);
                    } else {
                        p.vy -= CONFIG.GRAVITY * CONFIG.WATER.GRAVITY_SCALE * dt;
                    }
                    if (p.vy > CONFIG.WATER.MAX_SPEED) p.vy = CONFIG.WATER.MAX_SPEED;
                    if (p.vy < -CONFIG.WATER.MAX_SPEED) p.vy = -CONFIG.WATER.MAX_SPEED;
                } else {
                    let targetVx = 0;
                    if (State.keys.left)  { targetVx = -CONFIG.MOVE_SPEED; p.facingRight = false; }
                    else if (State.keys.right) { targetVx = CONFIG.MOVE_SPEED; p.facingRight = true; }
                    p.vx = approach(p.vx, targetVx, CONFIG.AIR_DRAG, dt);
                    if (Math.abs(p.vx) < 1) p.vx = 0;

                    if (State.keys.jump && p.onGround) {
                        p.vy = CONFIG.JUMP_FORCE;
                        p.onGround = false;
                    }

                    p.vy -= CONFIG.GRAVITY * dt;
                    if (p.vy < -CONFIG.MAX_FALL_SPEED) p.vy = -CONFIG.MAX_FALL_SPEED;
                }

                // 水平碰撞
                const newX = p.x + p.vx * dt;
                if (!this.checkCollision(newX, p.y, p.w, p.h)) {
                    p.x = newX;
                } else {
                    if (p.onGround) {
                        const stepY = p.y + CONFIG.TILE_SIZE;
                        if (!this.checkCollision(newX, stepY, p.w, p.h)) {
                            p.y = stepY;
                            p.x = newX;
                            p.vy = 0;
                            console.log('[physics] 台阶上升:', Math.floor(p.x), Math.floor(p.y));
                        } else {
                            p.vx = 0;
                        }
                    } else {
                        p.vx = 0;
                    }
                }

                // 垂直碰撞
                const newY = p.y + p.vy * dt;
                if (!this.checkCollision(p.x, newY, p.w, p.h)) {
                    p.y = newY;
                    p.onGround = false;

                    // 平台 snap
                    if (p.vy < 0 && !drop.active) {
                        const footLeft  = Math.floor(p.x / ts);
                        const footRight = Math.floor((p.x + p.w - 1) / ts);
                        const footY     = Math.floor(p.y / ts);
                        for (let fx = footLeft; fx <= footRight; fx++) {
                            if (World.getBlock(fx, footY) === 'platform') {
                                const platTop = (footY + 1) * ts;
                                const prevBottom = p.y - p.vy * dt;
                                if (prevBottom >= platTop && p.y <= platTop + 4) {
                                    p.y = platTop;
                                    p.vy = 0;
                                    p.onGround = true;
                                    console.log('[physics] 平台 snap:', fx, footY);
                                    break;
                                }
                            }
                        }
                    }
                } else {
                    if (p.vy < 0) p.onGround = true;
                    p.vy = 0;
                }
            }
        };

        // ============================================================

        const Input = {
            init() {
                DOM.canvas.addEventListener('contextmenu', (e) => e.preventDefault());
                DOM.canvas.addEventListener('pointerdown', (e) => {
                    e.preventDefault();
                    DOM.canvas.setPointerCapture(e.pointerId);
                    this.onCanvasStart(e);
                });
                DOM.canvas.addEventListener('pointermove', (e) => {
                    this.onCanvasMove(e);
                    if (e.pointerType !== 'touch') this.onCanvasHover(e);
                });
                DOM.canvas.addEventListener('pointerup', (e) => {
                    DOM.canvas.releasePointerCapture(e.pointerId);
                    this.onCanvasEnd(e);
                });
                DOM.canvas.addEventListener('pointerleave', (e) => {
                    if (InputState.isTouchDown) this.onCanvasEnd(e);
                });
                DOM.canvas.addEventListener('pointercancel', (e) => {
                    DOM.canvas.releasePointerCapture(e.pointerId);
                    this.onCanvasEnd(e);
                });
                DOM.canvas.addEventListener('wheel', (e) => {
                    e.preventDefault();
                    const delta = e.deltaY > 0 ? 1.1 : 0.9;
                    State.camera.zoom *= delta;
                    if (State.camera.zoom < 0.3) State.camera.zoom = 0.3;
                    if (State.camera.zoom > 3.0) State.camera.zoom = 3.0;
                }, { passive: false });

                DOM.dpadBtns.forEach(btn => {
                    const key = btn.dataset.key;
                    const down = (e) => { e.preventDefault(); State.keys[key] = true; };
                    const up   = (e) => { State.keys[key] = false; };
                    btn.addEventListener('pointerdown', down);
                    btn.addEventListener('pointerup',   up);
                    btn.addEventListener('pointerleave',up);
                    btn.addEventListener('pointercancel',up);
                });

                window.addEventListener('keydown', this.onKeyDown.bind(this));
                window.addEventListener('keyup',   this.onKeyUp.bind(this));

                const jumpDown = (e) => { e.preventDefault(); State.keys.jump = true; };
                const jumpUp   = (e) => { State.keys.jump = false; };
                DOM.jumpBtn.addEventListener('pointerdown', jumpDown);
                DOM.jumpBtn.addEventListener('pointerup',   jumpUp);
                DOM.jumpBtn.addEventListener('pointerleave',jumpUp);
                DOM.jumpBtn.addEventListener('pointercancel',jumpUp);

                DOM.actionBtn.addEventListener('pointerdown', (e) => {
                    e.preventDefault();
                    State.isDigging = !State.isDigging;
                    DOM.actionBtn.textContent = State.isDigging ? '⛏' : '🧱';
                    DOM.actionBtn.style.background = State.isDigging
                        ? 'rgba(180, 60, 60, 0.7)'
                        : 'rgba(60, 120, 60, 0.7)';
                    DOM.actionBtn.style.borderColor = State.isDigging ? '#a05050' : '#50a050';
                });

                console.log('[input] 输入系统初始化完成 (Pointer Events)');
            },

            getCanvasCoords(e) {
                const rect = DOM.canvas.getBoundingClientRect();
                return { x: e.clientX - rect.left, y: e.clientY - rect.top };
            },

            doRepeatAction() {
                const coords = Camera.screenToWorld(InputState.touchCurrentX, InputState.touchCurrentY);
                State.mouseWorldX = coords.x;
                State.mouseWorldY = coords.y;
                if (coords.x < 0 || coords.x >= CONFIG.WORLD_WIDTH || coords.y < 0 || coords.y >= CONFIG.WORLD_HEIGHT) return;
                if (State.isDigging) {
                    World.setBlock(coords.x, coords.y, 'air');
                } else {
                    const p = State.player;
                    const ts = CONFIG.TILE_SIZE;
                    const bx = coords.x * ts;
                    const by = coords.y * ts;
                    const overlap = !(bx + ts <= p.x || bx >= p.x + p.w || by + ts <= p.y || by >= p.y + p.h);
                    if (!overlap) {
                        World.setBlock(coords.x, coords.y, State.selectedBlock);
                    }
                }
            },

            onCanvasStart(e) {
                e.preventDefault();
                InputState.isTouchDown = true;
                const coords = this.getCanvasCoords(e);
                InputState.touchStartX = coords.x;
                InputState.touchStartY = coords.y;
                InputState.touchCurrentX = coords.x;
                InputState.touchCurrentY = coords.y;
                InputState.lastGridX = -1;
                InputState.lastGridY = -1;
                this.doRepeatAction();
            },

            onCanvasMove(e) {
                if (!InputState.isTouchDown) return;
                const coords = this.getCanvasCoords(e);
                InputState.touchCurrentX = coords.x;
                InputState.touchCurrentY = coords.y;
                const sw = Camera.screenToWorld(coords.x, coords.y);
                State.mouseWorldX = sw.x;
                State.mouseWorldY = sw.y;
                // 新逻辑：格子坐标变化立即触发，无限速
                if (sw.x !== InputState.lastGridX || sw.y !== InputState.lastGridY) {
                    InputState.lastGridX = sw.x;
                    InputState.lastGridY = sw.y;
                    this.doRepeatAction();
                }
            },

            onCanvasEnd(e) {
                InputState.isTouchDown = false;
                InputState.lastGridX = -1;
                InputState.lastGridY = -1;
                console.log('[input] 画布操作结束');
            },

            onCanvasHover(e) {
                if (InputState.isTouchDown) return;
                const rect = DOM.canvas.getBoundingClientRect();
                State.mouseScreenX = e.clientX - rect.left;
                State.mouseScreenY = e.clientY - rect.top;
                const sw = Camera.screenToWorld(State.mouseScreenX, State.mouseScreenY);
                State.mouseWorldX = sw.x;
                State.mouseWorldY = sw.y;
            },

            onKeyDown(e) {
                switch (e.key) {
                    case 'ArrowLeft':  case 'a': State.keys.left  = true; break;
                    case 'ArrowRight': case 'd': State.keys.right = true; break;
                    case 'ArrowUp':    case 'w': State.keys.up    = true; break;
                    case 'ArrowDown':  case 's': State.keys.down  = true; break;
                    case 'k':          case ' ': State.keys.jump = true; break;
                }
            },

            onKeyUp(e) {
                switch (e.key) {
                    case 'ArrowLeft':  case 'a': State.keys.left  = false; break;
                    case 'ArrowRight': case 'd': State.keys.right = false; break;
                    case 'ArrowUp':    case 'w': State.keys.up    = false; break;
                    case 'ArrowDown':  case 's': State.keys.down  = false; break;
                    case 'k':          case ' ': State.keys.jump = false; break;
                }
            }
        };

        // ============================================================
        //  MODULE: Fullscreen
        // ============================================================
        const Fullscreen = {
            getElement() {
                return document.fullscreenElement || document.webkitFullscreenElement || document.mozFullScreenElement || document.msFullscreenElement || null;
            },
            isSupported() {
                const el = document.documentElement;
                return !!(el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen || el.msRequestFullscreen);
            },
            async enter() {
                const el = document.documentElement;
                try {
                    if (el.requestFullscreen) await el.requestFullscreen();
                    else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
                    else if (el.mozRequestFullScreen) el.mozRequestFullScreen();
                    else if (el.msRequestFullscreen) el.msRequestFullscreen();
                } catch (err) { console.warn('[fullscreen] 进入全屏失败:', err); throw err; }
            },
            async exit() {
                try {
                    if (document.exitFullscreen) await document.exitFullscreen();
                    else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
                    else if (document.mozCancelFullScreen) document.mozCancelFullScreen();
                    else if (document.msExitFullscreen) document.msExitFullscreen();
                } catch (err) { console.warn('[fullscreen] 退出全屏失败:', err); throw err; }
            },
            async lockLandscape() {
                if (screen.orientation && screen.orientation.lock) { try { await screen.orientation.lock('landscape'); } catch (e) {} }
            },
            async unlockOrientation() {
                if (screen.orientation && screen.orientation.unlock) { try { screen.orientation.unlock(); } catch (e) {} }
            },
            updateBtn() {
                const btn = DOM.fullscreenBtn;
                if (this.getElement()) {
                    btn.innerHTML = '⛶'; btn.style.borderColor = '#88ff88'; btn.style.background = 'rgba(30, 60, 30, 0.85)'; btn.title = '退出全屏';
                } else {
                    btn.innerHTML = '⛶'; btn.style.borderColor = '#4a4a6a'; btn.style.background = 'rgba(30, 30, 50, 0.85)'; btn.title = '全屏切换';
                }
            },
            showFeedback(success) {
                const btn = DOM.fullscreenBtn;
                const oldBg = btn.style.background;
                btn.style.background = success ? 'rgba(60, 120, 60, 0.9)' : 'rgba(180, 60, 60, 0.9)';
                setTimeout(() => { btn.style.background = oldBg; this.updateBtn(); }, 300);
            },
            init() {
                DOM.fullscreenBtn.addEventListener('click', async () => {
                    if (this.getElement()) {
                        try { await this.exit(); await this.unlockOrientation(); this.showFeedback(true); }
                        catch (err) { this.showFeedback(false); }
                    } else {
                        try { await this.enter(); await this.lockLandscape(); this.showFeedback(true); }
                        catch (err) {
                            this.showFeedback(false);
                            if (!this.isSupported()) { try { await this.lockLandscape(); } catch (e2) {} }
                        }
                    }
                });
                ['fullscreenchange', 'webkitfullscreenchange', 'mozfullscreenchange', 'MSFullscreenChange'].forEach(evt => {
                    document.addEventListener(evt, () => this.updateBtn());
                });
                this.updateBtn();
                console.log('[fullscreen] 全屏控制初始化完成');
            }
        };

        // ============================================================
        //  MODULE: ConsoleModule
        // ============================================================
        const ConsoleModule = {
            autoScroll: true,
            history: [],
            historyIndex: -1,
            lastToggleTime: 0,
            touchActive: false,
            lastTouchY: 0,
            lastScrollTop: -1,

            init() {
                const panel   = DOM.consolePanel;
                const content = DOM.consoleContent;
                const input   = DOM.consoleInput;
                const header  = DOM.consoleHeader;
                const autoBtn = DOM.consoleAuto;
                const clearBtn= DOM.consoleClear;
                const toggle  = DOM.consoleToggle;

                if (!panel || !content || !input || !header || !autoBtn || !clearBtn || !toggle) {
                    console.error('[console] 控制台 DOM 元素缺失，跳过初始化');
                    return;
                }

                const origLog   = console.log;
                const origWarn  = console.warn;
                const origError = console.error;
                const origInfo  = console.info;
                console.__orig = { log: origLog, warn: origWarn, error: origError, info: origInfo };

                console.log   = (...args) => { origLog.apply(this, args);   this.appendLine('log',   this.stringifyArgs(args)); };
                console.warn  = (...args) => { origWarn.apply(this, args);  this.appendLine('warn',  this.stringifyArgs(args)); };
                console.error = (...args) => { origError.apply(this, args); this.appendLine('error', this.stringifyArgs(args)); };
                console.info  = (...args) => { origInfo.apply(this, args);  this.appendLine('info',  this.stringifyArgs(args)); };

                window.onerror = (msg, url, line, col, err) => {
                    const text = err && err.stack ? err.stack : (msg + ' at ' + (url || '?') + ':' + line + ':' + col);
                    this.appendLine('error', text);
                    return false;
                };
                window.addEventListener('error', (e) => {
                    if (e.error && e.error.stack) this.appendLine('error', e.error.stack);
                    else this.appendLine('error', e.message + ' at ' + (e.filename || '?') + ':' + e.lineno + ':' + e.colno);
                });
                window.addEventListener('unhandledrejection', (e) => {
                    const reason = e.reason;
                    if (reason instanceof Error) this.appendLine('error', 'Unhandled Promise Rejection: ' + (reason.stack || reason.message));
                    else this.appendLine('error', 'Unhandled Promise Rejection: ' + String(reason));
                });

                content.addEventListener('touchstart', (e) => {
                    this.touchActive = true;
                    this.lastTouchY = e.touches[0].clientY;
                    this.lastScrollTop = content.scrollTop;
                }, { passive: true });
                content.addEventListener('touchmove', (e) => {
                    if (!this.touchActive) return;
                    const y = e.touches[0].clientY;
                    const st = content.scrollTop;
                    if (st !== this.lastScrollTop || Math.abs(y - this.lastTouchY) > 20) {
                        this.lastTouchY = y;
                        this.lastScrollTop = st;
                    }
                }, { passive: true });
                content.addEventListener('touchend', () => { this.touchActive = false; }, { passive: true });

                const togglePanel = () => {
                    const isCollapsed = panel.classList.toggle('collapsed');
                    console.log('[console] 控制台' + (isCollapsed ? '收起' : '展开'));
                };
                header.addEventListener('pointerdown', (e) => {
                    if (['consoleClear', 'consoleToggle', 'consoleAuto', 'consoleCopy'].includes(e.target.id)) return;
                    togglePanel();
                });
                toggle.addEventListener('pointerdown', (e) => { e.stopPropagation(); togglePanel(); });

                const copyBtn = document.getElementById('consoleCopy');
                if (copyBtn) {
                    copyBtn.addEventListener('pointerdown', (e) => {
                        e.stopPropagation();
                        const text = Array.from(content.children).map(div => div.textContent).join('\n');
                        if (text && navigator.clipboard) {
                            navigator.clipboard.writeText(text).then(() => {
                                const old = copyBtn.textContent;
                                copyBtn.textContent = '已复制';
                                setTimeout(() => copyBtn.textContent = old, 800);
                            }).catch(() => { this.appendLine('warn', '复制失败'); });
                        } else { this.appendLine('warn', '无内容可复制或剪贴板不可用'); }
                    });
                }

                clearBtn.addEventListener('pointerdown', (e) => { e.stopPropagation(); content.innerHTML = ''; console.log('[console] 已清空'); });

                autoBtn.addEventListener('pointerdown', (e) => {
                    e.stopPropagation();
                    const now = Date.now();
                    if (now - this.lastToggleTime < 300) return;
                    this.lastToggleTime = now;
                    this.autoScroll = !this.autoScroll;
                    autoBtn.classList.toggle('auto-on', this.autoScroll);
                    autoBtn.classList.toggle('auto-off', !this.autoScroll);
                    if (this.autoScroll) content.scrollTop = content.scrollHeight;
                    console.log('[console] 自动滚动' + (this.autoScroll ? '开启' : '关闭'));
                });

                input.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter' || e.keyCode === 13) {
                        e.preventDefault();
                        this.executeInput();
                    } else if (e.key === 'ArrowUp') {
                        e.preventDefault();
                        if (this.historyIndex > 0) { this.historyIndex--; input.value = this.history[this.historyIndex]; }
                    } else if (e.key === 'ArrowDown') {
                        e.preventDefault();
                        if (this.historyIndex < this.history.length - 1) { this.historyIndex++; input.value = this.history[this.historyIndex]; }
                        else { this.historyIndex = this.history.length; input.value = ''; }
                    }
                });
                input.addEventListener('change', () => { if (input.value.trim()) this.executeInput(); });

                this.appendLine('info', '控制台就绪。输入 JS 代码按回车执行。');
                console.log('[console] 控制台初始化完成');
            },

            nowTime() {
                const d = new Date();
                const pad = (n) => n.toString().padStart(2, '0');
                return pad(d.getHours()) + ':' + pad(d.getMinutes()) + ':' + pad(d.getSeconds());
            },

            appendLine(type, text) {
                try {
                    const div = document.createElement('div');
                    div.className = 'log-line log-' + type;
                    div.innerHTML = '<span class="log-time">' + this.nowTime() + '</span>' + this.escapeHtml(String(text));
                    DOM.consoleContent.appendChild(div);
                    if (this.autoScroll) DOM.consoleContent.scrollTop = DOM.consoleContent.scrollHeight;
                } catch (e) {
                    const orig = console.__orig || console;
                    orig.error('[console] appendLine 失败:', e);
                }
            },

            escapeHtml(str) {
                return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            },

            stringifyArgs(args) {
                return args.map(arg => {
                    if (arg === null) return 'null';
                    if (arg === undefined) return 'undefined';
                    if (typeof arg === 'string') return arg;
                    if (typeof arg === 'number' || typeof arg === 'boolean') return String(arg);
                    if (arg instanceof Error) return arg.stack || arg.message || String(arg);
                    try { return JSON.stringify(arg, null, 2); } catch (e) { return String(arg); }
                }).join(' ');
            },

            executeInput() {
                const code = DOM.consoleInput.value.trim();
                if (!code) return;
                this.history.push(code);
                this.historyIndex = this.history.length;
                this.appendLine('info', '> ' + code);
                try {
                    const result = eval(code);
                    if (result !== undefined) this.appendLine('log', this.stringifyArgs([result]));
                } catch (err) {
                    this.appendLine('error', err.stack || err.message || String(err));
                }
                DOM.consoleInput.value = '';
                DOM.consoleInput.blur();
            }
        };

        // ============================================================
        //  MODULE: GameLoop
        // ============================================================
        const GameLoop = {
            lastTime: 0,
            fps: { frames: 0, lastTime: 0, value: 0 },
            tick(time) {
                if (!this.lastTime) this.lastTime = time;
                let dt = (time - this.lastTime) / 1000;
                this.lastTime = time;
                if (dt > 0.1) dt = 0.1;
                if (dt <= 0) dt = 0.001;
                State.frameCount++;

                // FPS 计算
                this.fps.frames++;
                if (time - this.fps.lastTime >= 1000) {
                    this.fps.value = this.fps.frames;
                    this.fps.frames = 0;
                    this.fps.lastTime = time;
                }
                Physics.update(dt);
                Camera.update();
                PlayerRenderer.update();
                ThreeJSRenderer.updateCamera();
                ThreeJSRenderer.render();
                DOM.coordsEl.textContent = 'X:' + Math.floor(State.player.x / CONFIG.TILE_SIZE)
                                         + ' Y:' + Math.floor(State.player.y / CONFIG.TILE_SIZE);
                if (DOM.fpsEl) DOM.fpsEl.textContent = 'FPS:' + this.fps.value;
                requestAnimationFrame((t) => this.tick(t));
            },
            start() {
                console.log('[loop] 游戏循环启动');
                this.lastTime = 0;
                requestAnimationFrame((t) => this.tick(t));
            }
        };

        // ============================================================
        //  MODULE: App
        // ============================================================
        const App = {
            init() {
                console.log('[app] ====== My Terraria v2 启动 (直观左下坐标系) ======');
                initDOM();
                this.resize();
                window.addEventListener('resize', () => this.resize());

                const selector = document.getElementById('blockSelector');
                BlockRegistry.getAllPlaceable().forEach((type) => {
                    const data = window.BlockRegistry.get(type);
                    const btn = document.createElement('div');
                    btn.className = 'block-btn' + (type === State.selectedBlock ? ' selected' : '');
                    btn.style.background = data.uiColor || data.color || '#888';
                    btn.dataset.type = type;
                    btn.title = data.tooltip || type;
                    btn.textContent = data.icon || type[0];
                    btn.addEventListener('click', () => {
                        document.querySelectorAll('.block-btn').forEach(b => b.classList.remove('selected'));
                        btn.classList.add('selected');
                        State.selectedBlock = type;
                        console.log('[input] 切换方块:', type);
                    });
                    selector.appendChild(btn);
                });

                ThreeJSRenderer.init();
                World.init();
                ThreeJSRenderer.buildWorld();
                PlayerRenderer.init();

                Input.init();
                Fullscreen.init();
                ConsoleModule.init();
                GameLoop.start();
                console.log('[app] 初始化全部完成');
            },

            resize() {
                ThreeJSRenderer.resize();
                const panel = DOM.consolePanel;
                if (panel && !panel.classList.contains('collapsed')) {
                    const h = window.innerHeight;
                    const w = window.innerWidth;
                    if (w > h && h < 500) panel.style.height = '120px';
                    else if (w > h && h < 600) panel.style.height = '150px';
                    else panel.style.height = '';
                }
            }
        };

        // 方块注册（必须在 TextureGenerator 之前）
        BlockRegistry.register('air',      { color: null,               solid: false, icon: '',   tooltip: '空气' });
        BlockRegistry.register('dirt',     { color: '#8B6F47',           solid: true,  icon: '土',   tooltip: '泥土',     uiColor: '#8B4513' });
        BlockRegistry.register('stone',    { color: '#7a7a85',           solid: true,  icon: '石',   tooltip: '石头',     uiColor: '#708090' });
        BlockRegistry.register('grass',    { color: '#4a8c3f',           solid: true,  icon: '草',   tooltip: '草',       uiColor: '#228B22' });
        BlockRegistry.register('wood',     { color: '#a07040',           solid: true,  icon: '木',   tooltip: '木头',     uiColor: '#D2691E' });
        BlockRegistry.register('sand',     { color: '#d4b896',           solid: true,  icon: '沙',   tooltip: '沙子',     uiColor: '#FFD700' });
        BlockRegistry.register('water',    { color: 'rgba(65,105,225,0.6)', solid: false, icon: '水',   tooltip: '水',       uiColor: '#4169E1' });
        BlockRegistry.register('platform', { color: '#C4956A',           solid: true,  icon: '台',   tooltip: '平台',     uiColor: '#C4956A' });
        console.log('[app] 方块注册完成:', BlockRegistry.getAllPlaceable().join(', '));

        window.App = App;

    })();
    </script>

    <script>
    // ============================================================
    //  MODULE: TextureGenerator（与主代码解耦）
    // ============================================================
    // ============================================================
    //  MODULE: TextureGenerator
    // ============================================================
    const TextureGenerator = {
        atlasCanvas: null,
        atlasCtx: null,
        atlasTexture: null,
        tileSize: 32,
        atlasWidth: 224, // 7 * 32
        atlasHeight: 32,

        init() {
            this.atlasCanvas = document.createElement('canvas');
            this.atlasCanvas.width = this.atlasWidth;
            this.atlasCanvas.height = this.atlasHeight;
            this.atlasCtx = this.atlasCanvas.getContext('2d');
            console.log('[texture] 图集生成器初始化');
        },

        generate(type) {
            const s = this.tileSize;
            const c = document.createElement('canvas');
            c.width = s;
            c.height = s;
            const ctx = c.getContext('2d');
            const data = window.BlockRegistry.get(type);
            if (!data) return c;

            // 基底
            ctx.fillStyle = data.color;
            ctx.fillRect(0, 0, s, s);

            // 通用边框（除 platform/water 外）
            if (type !== 'platform' && type !== 'water') {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
                ctx.fillRect(0, 0, s, 2);
                ctx.fillRect(0, 0, 2, s);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.08)';
                ctx.fillRect(s - 2, 0, 2, s);
                ctx.fillRect(0, s - 2, s, 2);
                if (type === 'dirt' || type === 'grass') {
                    ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
                    ctx.fillRect(8, 12, 4, 4);
                    ctx.fillRect(20, 6, 3, 3);
                }
            }

            // platform：32x32 贴图，下方 24px 透明
            if (type === 'platform') {
                ctx.clearRect(0, 0, s, s);
                const platH = 8;
                const r = 8;
                ctx.fillStyle = '#C4956A';
                ctx.beginPath();
                ctx.moveTo(r, 0);
                ctx.lineTo(s - r, 0);
                ctx.quadraticCurveTo(s, 0, s, r);
                ctx.lineTo(s, platH - r);
                ctx.quadraticCurveTo(s, platH, s - r, platH);
                ctx.lineTo(r, platH);
                ctx.quadraticCurveTo(0, platH, 0, platH - r);
                ctx.lineTo(0, r);
                ctx.quadraticCurveTo(0, 0, r, 0);
                ctx.closePath();
                ctx.fill();
                ctx.fillStyle = '#A07850';
                ctx.fillRect(r, 0, s - r * 2, 2);
                ctx.fillStyle = 'rgba(0,0,0,0.2)';
                ctx.fillRect(0, 0, r, platH);
                ctx.fillRect(s - r, 0, r, platH);
                ctx.fillStyle = 'rgba(0,0,0,0.12)';
                ctx.fillRect(10, 3, 6, 1);
                ctx.fillRect(20, 5, 8, 1);
                ctx.fillRect(6, 7, 10, 1);
                ctx.fillStyle = 'rgba(255,255,255,0.08)';
                ctx.fillRect(r, platH - 1, s - r * 2, 1);
            }

            // water：静态蓝底 + 顶部高光条
            if (type === 'water') {
                ctx.fillStyle = 'rgba(65, 105, 225, 0.6)';
                ctx.fillRect(0, 0, s, s);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.1)';
                ctx.fillRect(0, 0, s, 2);
            }

            return c;
        },

        buildAtlas() {
            const types = ['dirt', 'stone', 'grass', 'sand', 'wood', 'platform', 'water'];
            const s = this.tileSize;
            this.atlasCtx.clearRect(0, 0, this.atlasWidth, this.atlasHeight);
            types.forEach((type, i) => {
                const tile = this.generate(type);
                this.atlasCtx.drawImage(tile, i * s, 0);
                const data = window.BlockRegistry.get(type);
                if (data) data.tileIndex = i;
            });
            console.log('[texture] 图集构建完成:', types.join(', '));
            return this.atlasCanvas;
        },

        getTexture() {
            if (!this.atlasTexture) {
                this.atlasTexture = new THREE.CanvasTexture(this.atlasCanvas);
                this.atlasTexture.magFilter = THREE.NearestFilter;
                this.atlasTexture.minFilter = THREE.NearestFilter;
            }
            return this.atlasTexture;
        },

        preview() {
            const url = this.atlasCanvas.toDataURL();
            const div = document.createElement('div');
            div.style.cssText = 'position:fixed;top:60px;left:12px;z-index:9998;background:#1e1e1e;border:2px solid #444;padding:8px;border-radius:4px;cursor:pointer;';
            const img = document.createElement('img');
            img.src = url;
            img.style.cssText = 'image-rendering:pixelated;width:224px;height:32px;';
            div.appendChild(img);
            const label = document.createElement('div');
            label.textContent = '图集预览 (224x32) 点击关闭';
            label.style.cssText = 'color:#888;font-size:11px;margin-top:4px;text-align:center;';
            div.appendChild(label);
            div.addEventListener('click', () => div.remove());
            document.body.appendChild(div);
            console.log('[texture] 预览已显示，点击关闭');
            return url;
        }
    };



    // 初始化纹理图集，然后启动主应用
    TextureGenerator.init();
    TextureGenerator.buildAtlas();
    window.__ATLAS_TEXTURE = TextureGenerator.getTexture();
    if (window.App) window.App.init();
    else console.error('[texture] App 未定义，无法启动');
    </script>
